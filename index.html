    }
    html += '<span>' + formatColorName(current) + '</span></div>';
  }
  // Compact matrix
  html += '<div style="display:flex;flex-direction:column;gap:2px;">';
  // header
  html += '<div style="display:grid;grid-template-columns:56px repeat(4,1fr);gap:2px;align-items:center;"><div></div>';
  for (var fi = 0; fi < FINISHES.length; fi++) {
    html += '<div style="font-size:9px;font-weight:700;text-align:center;letter-spacing:0.5px;">' + FINISHES[fi].toUpperCase() + '</div>';
  }
  html += '</div>';
  // rows
  for (var i = 0; i < FAMILIES.length; i++) {
    var fam = FAMILIES[i];
    html += '<div style="display:grid;grid-template-columns:56px repeat(4,1fr);gap:2px;align-items:center;"><div style="font-size:9px;font-weight:700;letter-spacing:0.3px;padding:2px 0;">' + fam.name.toUpperCase() + '</div>';
    for (var j = 0; j < FINISHES.length; j++) {
      var finish = FINISHES[j];
      var label2 = fam.prefix === null ? finish : fam.prefix + ' (' + finish + ')';
      var found = COLOR_DATA.find(function(lr){ return lr[0] === label2; });
      if (!found) { html += '<div></div>'; continue; }
      var upperLabel = fam.prefix === null ? finish.toUpperCase() : finish.toUpperCase() + ' ' + fam.prefix.toUpperCase();
      var sel = current === upperLabel ? ' selected' : '';
      var imgUrl2 = COLOR_IMAGES[upperLabel];
      var bgStyle = imgUrl2 ? 'background-image:url('+imgUrl2+');background-size:cover;background-position:center' : 'background:'+found[1];
      var borderStyle = sel ? 'border:2px solid #006233' : 'border:1px solid rgba(255,255,255,0.12)';
      html += '<div style="padding:1px;"><div class="viz-swatch" data-surf="' + surfaceKey + '" data-color="' + upperLabel + '" style="' + bgStyle + ';width:100%;height:26px;border-radius:4px;cursor:pointer;' + borderStyle + '"></div></div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderVizHtml(){
  const T = t();
  const isFront = state.vizIsFront;
  const vizImg = isFront ? state.frontVizImage : state.vizImage;
  const vizRes = isFront ? state.frontVizResult : state.vizResult;
  const vizLoad = isFront ? state.frontVizLoading : state.vizLoading;
  const vizMod = isFront ? state.frontVizMode : state.vizMode;
  const isTerrazzo = isFront ? false : (state.look==='terrazzo');
  const activeSurfaces = getActiveVizSurfaces();
  const allSurfOpts = ['gulv','bordplade','vaeg','trappe'];
  const allowedForProject = getAllowedVizSurfaces();
  const surfOpts = allowedForProject ? allSurfOpts.filter(function(k){ return allowedForProject.indexOf(k) >= 0; }) : allSurfOpts;

  const surfacePicker = `<div style="margin-bottom:12px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.7;margin-bottom:8px;">${T.vizSurfacePick}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">${surfOpts.map(k=>{const on=activeSurfaces.includes(k);return `<button onclick="setVizSurfaceType('${k}')" style="padding:10px 6px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid ${on?'#006233':'rgba(255,255,255,0.15)'};background:${on?'#006233':'rgba(255,255,255,0.06)'};color:#fff;-webkit-appearance:none;appearance:none;">${on?'✓ ':''}${T.vizSurfaceOpts[k]}</button>`}).join('')}</div>
  </div>`;

  var surfaceColorsHtml = '';
  if (!isTerrazzo) {
    for (var si = 0; si < activeSurfaces.length; si++) {
      surfaceColorsHtml += renderVizSurfaceColorMatrix(activeSurfaces[si]);
    }
  }
  var perSurfaceColorDesc = activeSurfaces.map(function(k){
    var c = getVizSurfaceColor(k);
    return (T.vizSurfaceOpts[k]||k) + ': ' + (c ? formatColorName(c) : '–');
  }).join(', ');
  const activeLabels = activeSurfaces.map(k=>T.vizSurfaceOpts[k]).join(', ');
  var colorInfoPart = isTerrazzo ? (T.sumColor+': <b>'+(state.colors.length?state.colors.join(', '):'–')+'</b>') : '<b>'+perSurfaceColorDesc+'</b>';
  var applyingText = isFront ? T.vizSelectedColors : T.vizApplyingColors;
  let infoHtml = `<div class="viz-info"><b>${applyingText}</b><br>${T.vizSurface}: <b>${activeLabels}</b><br>${colorInfoPart}${isFront?'':'<br>'+T.sumLook+': <b>'+(isTerrazzo?T.lookTerrazzo:T.lookBeton)+'</b>'}</div>`;

  if (!vizImg){
    return `<div class="viz-wrap">
      <p class="viz-disclaimer"><span class="imp">${T.vizImpLabel}</span>${T.vizDisclaimer}</p>
      <p class="sub" style="margin-bottom:10px;font-size:12px;">${T.vizSub}</p>
      ${surfacePicker}
      ${surfaceColorsHtml}
      ${infoHtml}
      <label class="upload-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>${T.vizUploadCta}</span>
        <input type="file" id="vizFile" accept="image/jpeg,image/jpg,image/png,image/webp,image/*" />
      </label>
      <button class="viz-confirm-btn" onclick="confirmVizColors()">✓ ${T.confirmColor}</button>
    </div>`;
  }

  return `<div class="viz-wrap">
    <p class="viz-disclaimer"><span class="imp">${T.vizImpLabel}</span>${T.vizDisclaimer}</p>
    ${surfacePicker}
    ${surfaceColorsHtml}
    ${infoHtml}
    ${vizRes ? `<div class="compare-row">
      <button class="compare-tab ${vizMod==='after'?'active':''}" onclick="setVizMode('after')">${T.vizAfter}</button>
      <button class="compare-tab ${vizMod==='compare'?'active':''}" onclick="setVizMode('compare')">${T.vizCompare}</button>
    </div>`:''}
    <div class="image-wrap" id="vizImgWrap">
      <img id="vizPreview" src="${vizRes || vizImg}" alt="" />
      ${vizRes && vizMod==='compare' ? `<div class="compare-container" id="vizCmpContainer">
        <div class="compare-before-wrap" id="vizBeforeWrap"><img id="vizBeforeImg" src="${vizImg}" alt="" /></div>
        <div class="compare-handle" id="vizHandle"></div>
        <div class="corner-label before">${T.vizBefore}</div>
        <div class="corner-label after">${T.vizAfterLbl}</div>
      </div>`:''}
      <div class="loading-overlay ${vizLoad?'show':''}" id="vizLoad">
        <div class="spinner"></div>
        <div style="font-size:14px;font-weight:600;">${T.vizLoading}</div>
        <div style="font-size:12px;opacity:0.7;">${T.vizLoadHint}</div>
      </div>
    </div>
    <div class="cta-row">
      <button class="cta" id="vizGenBtn" ${(vizLoad||!hasAnyVizColor())?'disabled':''}>${vizRes ? T.vizRegenerate : T.vizGenerate}</button>
      ${vizRes ? `<button class="cta secondary" id="vizDlBtn">${T.vizDownload}</button>`:''}
      <button class="cta secondary" id="vizResetBtn">${T.vizReset}</button>
    </div>
    <button class="viz-confirm-btn" onclick="confirmVizColors()">✓ ${T.confirmColor}</button>
  </div>`;
}

function bindVizEvents(){
  var isFront = state.vizIsFront;
  const fileInp = document.getElementById('vizFile');
  if (fileInp) fileInp.addEventListener('change', (e)=>{ if(e.target.files && e.target.files[0]) handleVizFile(e.target.files[0]); });
  var vizSwatches = document.querySelectorAll('.viz-swatch');
  for (var vsi = 0; vsi < vizSwatches.length; vsi++) {
    (function(el){
      el.addEventListener('click', function(){
        var surf = el.getAttribute('data-surf');
        var col = el.getAttribute('data-color');
        if (surf && col) setVizSurfaceColor(surf, col);
      });
    })(vizSwatches[vsi]);
  }
  const genBtn = document.getElementById('vizGenBtn');
  if (genBtn) genBtn.addEventListener('click', generateViz);
  const dlBtn = document.getElementById('vizDlBtn');
  if (dlBtn) dlBtn.addEventListener('click', downloadViz);
  const rsBtn = document.getElementById('vizResetBtn');
  if (rsBtn) rsBtn.addEventListener('click', ()=>{
    if (isFront) { state.frontVizImage=null; state.frontVizResult=null; state.frontVizLoading=false; }
    else { state.vizImage=null; state.vizResult=null; state.vizLoading=false; }
    render();
  });
  var vizMod = isFront ? state.frontVizMode : state.vizMode;
  var vizRes = isFront ? state.frontVizResult : state.vizResult;
  if (vizMod==='compare' && vizRes) bindVizSlider();
}

function resizeImage(file, maxSize){
  maxSize = maxSize||2048;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const w = img.naturalWidth, h = img.naturalHeight;
        if (!w || !h){ reject(new Error('Invalid image')); return; }
        const scale = Math.min(1, maxSize/Math.max(w,h));
        const cw = Math.round(w*scale), ch = Math.round(h*scale);
        const canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        const ctx = canvas.getContext('2d');
        if (!ctx){ reject(new Error('Canvas not supported')); return; }
        ctx.drawImage(img, 0, 0, cw, ch);
        try { resolve(canvas.toDataURL('image/jpeg', 0.9)); } catch(err){ reject(err); }
      };
      img.onerror = ()=> reject(new Error('Could not load image. Format may be unsupported (e.g. HEIC).'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

function handleVizFile(file){
  var isFront = state.vizIsFront;
  resizeImage(file, 2048).then(dataUrl=>{
    if (isFront) { state.frontVizImage = dataUrl; state.frontVizResult = null; }
    else { state.vizImage = dataUrl; state.vizResult = null; }
    render();
  }).catch(err=>{
    console.error('Image error', err);
    alert((t().vizErr) + '\n' + (err && err.message ? err.message : '') + '\n\n' + (lang==='da'?'Brug JPG/PNG i stedet for HEIC.':lang==='de'?'Bitte JPG/PNG statt HEIC verwenden.':'Use JPG/PNG instead of HEIC.'));
  });
}

function buildVizPrompt(){
  const isFront = state.vizIsFront;
  const isTerrazzo = isFront ? false : (state.look==='terrazzo');
  const activeSurfaces = getActiveVizSurfaces();
  const surfaceMap = { vaeg:'wall', bordplade:'countertop / worktop', trappe:'staircase / stairs (treads and risers)', gulv:'floor' };
  const surfaceList = activeSurfaces.map(k=>surfaceMap[k]||'floor');
  const surfaceTxt = surfaceList.length>1 ? (surfaceList.slice(0,-1).join(', ') + ' and ' + surfaceList[surfaceList.length-1]) : surfaceList[0];
  const surfaceNoun = surfaceList.length>1 ? 'surfaces' : 'surface';
  if (isTerrazzo){
    const flakes = state.colors.length ? state.colors : ['CHAMPAGNE'];
    return `Transform the ${surfaceTxt} ${surfaceNoun} to a realistic seamless terrazzo / flakes epoxy finish on a pure WHITE base coat with colored flake chips ONLY in these exact colors: ${flakes.map(f=>f.toLowerCase()).join(', ')}. Apply this same finish to ALL of the following ${surfaceNoun}: ${surfaceTxt}. CRITICAL: 1) Base must be pure WHITE (#FFFFFF). 2) Flake chips 3-5mm scale with white between. 3) Even random distribution, MATTE clear sealer (no gloss). 4) Keep all other elements exactly the same.`;
  }
  var parts = [];
  for (var ai = 0; ai < activeSurfaces.length; ai++) {
    var sk = activeSurfaces[ai];
    var c = getVizSurfaceColor(sk);
    if (!c) continue;
    var norm = normalizeBetonColor(c);
    var hex = findColorHex(c);
    var desc = norm + (hex ? ' (~'+hex+')' : '');
    parts.push('the ' + (surfaceMap[sk]||'floor') + ' surface to a realistic hand-applied microcement / concrete finish with a MATTE (non-glossy, non-reflective) surface in the color "' + desc + '"');
  }
  if (parts.length === 0) parts.push('the ' + surfaceTxt + ' ' + surfaceNoun + ' to a realistic hand-applied microcement / concrete finish with a MATTE (non-glossy, non-reflective) surface in the color "Alba (~#FFFFFF)"');
  return 'Transform ' + parts.join(', and ') + '. The microcement should look natural with subtle tonal variations, slight imperfections, and the characteristic smooth-yet-textured appearance of real microcement. Keep all other elements in the photo exactly the same — only change the specified surfaces to microcement in the specified colors.';
}

function generateViz(){
  var isFront = state.vizIsFront;
  var vizImg = isFront ? state.frontVizImage : state.vizImage;
  var vizLoad = isFront ? state.frontVizLoading : state.vizLoading;
  if (!vizImg || vizLoad) return;
  if (isFront) { state.frontVizLoading = true; }
  else { state.vizLoading = true; }
  render();
  const b64 = String(vizImg).split(',')[1];
  const headers = { 'Content-Type':'application/json' };
  if (VIZ_CONFIG.SECRET) headers['Authorization'] = 'Bearer ' + VIZ_CONFIG.SECRET;
  fetch(VIZ_CONFIG.TOOLKIT_URL + '/images/edit/', {
    method:'POST', headers,
    body: JSON.stringify({
      prompt: buildVizPrompt(),
      images:[{ type:'image', image:b64 }],
      aspectRatio:'4:3', size:'3840x2880', quality:'high', outputFormat:'png'
    })
  }).then(r=>{ if(!r.ok) throw new Error('API '+r.status); return r.json(); })
  .then(data=>{
    if (isFront) {
      state.frontVizResult = 'data:'+data.image.mimeType+';base64,'+data.image.base64Data;
      state.frontVizLoading = false; state.frontVizMode = 'after';
    } else {
      state.vizResult = 'data:'+data.image.mimeType+';base64,'+data.image.base64Data;
      state.vizLoading = false; state.vizMode = 'after';
    }
    render();
    if (state.showViz) setTimeout(function(){ bindVizEvents(); }, 50);
  }).catch(e=>{
    console.error('Viz error', e);
    if (isFront) { state.frontVizLoading = false; }
    else { state.vizLoading = false; }
    render();
    alert(t().vizErr);
  });
}

function setVizMode(m){
  var isFront = state.vizIsFront;
  if (isFront) { state.frontVizMode = m; }
  else { state.vizMode = m; }
  render();
  if (state.showViz) setTimeout(function(){ bindVizEvents(); }, 50);
}
function downloadViz(){
  var isFront = state.vizIsFront;
  var res = isFront ? state.frontVizResult : state.vizResult;
  if (!res) return;
  const a = document.createElement('a'); a.href = res; a.download = 'visualisering.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function bindVizSlider(){
  const cc = document.getElementById('vizCmpContainer');
  if (!cc) return;
  let dragging = false;
  function update(clientX){
    const r = cc.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX-r.left)/r.width));
    const wrap = document.getElementById('vizImgWrap').getBoundingClientRect();
    document.getElementById('vizBeforeWrap').style.width = (ratio*100)+'%';
    document.getElementById('vizHandle').style.left = (ratio*100)+'%';
    const bi = document.getElementById('vizBeforeImg');
    if (bi){ bi.style.width = wrap.width+'px'; bi.style.height = wrap.height+'px'; bi.style.maxWidth = 'none'; }
  }
  setTimeout(()=>update(cc.getBoundingClientRect().left + cc.getBoundingClientRect().width/2), 30);
  cc.addEventListener('mousedown', e=>{ dragging=true; update(e.clientX); });
  window.addEventListener('mousemove', e=>{ if(dragging) update(e.clientX); });
  window.addEventListener('mouseup', ()=>{ dragging=false; });
  cc.addEventListener('touchstart', e=>{ dragging=true; update(e.touches[0].clientX); }, { passive:true });
  window.addEventListener('touchmove', e=>{ if(dragging && e.touches[0]) update(e.touches[0].clientX); }, { passive:true });
  window.addEventListener('touchend', ()=>{ dragging=false; });
}

render();


function renderFrontFaqSuggestions(){
  var input = document.getElementById('ccFrontFaqSearch');
  var results = document.getElementById('ccFrontFaqResults');

  if (!input || !results) return;

  var query = input.value.trim().toLowerCase();

  if (!query) {
    results.innerHTML = '';
    results.classList.remove('open');
    return;
  }

  var items = FAQ_DATA[lang] || FAQ_DATA.da || [];
  var matches = [];

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var searchable = ((item.q || '') + ' ' + (item.a || '')).toLowerCase();

    if (searchable.indexOf(query) !== -1) {
      matches.push({ item: item, index: i });
    }

    if (matches.length >= 7) break;
  }

  if (!matches.length) {
    results.innerHTML = '<div class="cc-front-faq-empty">' + t().faqEmpty + '</div>';
    results.classList.add('open');
    return;
  }

  results.innerHTML = matches.map(function(match){
    return '<button type="button" class="cc-front-faq-result" onclick="openFrontFaqResult(' +
      match.index + ')">' + match.item.q + '</button>';
  }).join('');

  results.classList.add('open');
}

function openFrontFaqResult(index){
  state.showFaq = true;
  state.showInspiration = false;
  state.showViz = false;

  var faqPanel = document.getElementById('faqPanel');
  var inspirationPanel = document.getElementById('inspirationPanel');
  var vizPanel = document.getElementById('vizPanel');

  if (faqPanel) faqPanel.className = 'toggle-panel open';
  if (inspirationPanel) inspirationPanel.className = 'toggle-panel';
  if (vizPanel) vizPanel.className = 'toggle-panel';

  var item = (FAQ_DATA[lang] || FAQ_DATA.da || [])[index];
  var faqInput = document.getElementById('faqSearchInput');

  if (faqInput && item) {
    faqInput.value = item.q;
    renderFaqResults();
  }

  faqOpenItems[index] = true;

  setTimeout(function(){
    var faqItem = document.getElementById('faqItem' + index);

    if (faqItem) {
      faqItem.classList.add('open');
      faqItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 80);

  var results = document.getElementById('ccFrontFaqResults');
  if (results) results.classList.remove('open');
}

document.addEventListener('click', function(event){
  if (!event.target.closest('.cc-front-faq-search')) {
    var results = document.getElementById('ccFrontFaqResults');
    if (results) results.classList.remove('open');
  }
});

</script>
