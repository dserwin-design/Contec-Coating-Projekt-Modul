    { q:'What is primer used for?', a:'Primer ensures optimal adhesion to the substrate before subsequent layers are applied.', c:'ccPrimer' },
    { q:'When should primer be used?', a:'Primer is applied before our PURE microcement, CC Filler filler and CC Flow self-leveling mortar, as well as between layers to ensure optimal adhesion.', c:'ccPrimer' },
    { q:'Do you always need primer before microcement?', a:'Yes, primer must always be applied before applying our PURE microcement.', c:'ccPrimer' },
    { q:'Should primer be mixed with water?', a:'Yes. Mix the primer in a 1:1 ratio on non-absorbent substrates and 1:3 on absorbent substrates. An absorbent substrate absorbs liquid, e.g. concrete or filler, while a non-absorbent substrate barely absorbs liquid, e.g. tiles and clinker. Test the substrate with a water drop — if the water beads, the substrate is non-absorbent, and if it is absorbed, the substrate is absorbent.', c:'ccPrimer' },
    { q:'How much primer should be used per m²?', a:'At least 100 g of primer per m² should be used.', c:'ccPrimer' },
    { q:'How long should primer dry?', a:'The primer has a drying time of approx. 1 hour before the next layer can be applied.', c:'ccPrimer' },
    { q:'How many coats of primer should be applied?', a:'Primer is applied in one thin and even coat. If at least 100 g of primer per m² has not been applied, an additional coat should be applied.', c:'ccPrimer' },
    { q:'What temperature is required?', a:'The temperature must be at least 10 °C during application and drying.', c:'ccPrimer' },
    { q:'What is the difference between absorbent and non-absorbent substrates?', a:'An absorbent substrate absorbs liquid, e.g. concrete or filler. A non-absorbent substrate barely absorbs liquid, e.g. tiles and clinker. Test the substrate with a water drop to see if the water is absorbed or beads on the surface.', c:'ccPrimer' },
    { q:'What should you pay attention to when applying CC Primer?', a:'CC Primer should be applied in a thin and even coat. Avoid the product pooling in puddles or primer lakes, as this can affect adhesion and the subsequent build-up.', c:'ccPrimer' },
    { q:'Is CC Primer only used once in the process?', a:'No. CC Primer is not only used at the start. It must also be used before and between layers when applying PURE microcement, CC Filler and CC Flow.', c:'ccPrimer' },
    { q:'Must the substrate be clean before priming?', a:'Yes. The substrate must be firm, clean and free of dust, dirt and loose particles before the primer is applied. This ensures the best possible adhesion.', c:'ccPrimer' },
    { q:'Can you skip using primer?', a:'No. CC Primer is necessary to ensure that the next layer adheres correctly to the substrate. This applies before PURE microcement, CC Filler and CC Flow.', c:'ccPrimer' },
    { q:'Do you need primer on tiles before microcement?', a:'Yes. Tiles are typically a non-absorbent substrate and must therefore be primed before microcement is applied. CC Primer ensures optimal adhesion.', c:'ccPrimer' },
    { q:'Do you need primer on concrete before microcement?', a:'Yes. Concrete is typically an absorbent substrate and must therefore be primed before microcement is applied. CC Primer ensures optimal adhesion to the concrete.', c:'ccPrimer' },
    { q:'Do you need primer on filler before microcement?', a:'Yes. Filler is typically an absorbent substrate and must therefore be primed before microcement is applied. CC Primer ensures optimal adhesion to the filler.', c:'ccPrimer' },
    { q:'Can CC Primer be applied with tools other than a roller?', a:'Yes. A roller is recommended for most projects as it makes it easy to apply the primer in a thin and even coat. On some substrates, the primer can also be applied with a spray, watering can, broom or brush, as long as it is distributed evenly and does not pool in puddles or primer lakes.', c:'ccPrimer' },
    { q:'What is CC Filler?', a:'CC Filler is a filler compound used to level the substrate before applying microcement.', c:'ccFiller' },
    { q:'When should the filler be used?', a:'The filler is used when the substrate is uneven and needs to be levelled before applying microcement. CC Filler is Contec Coatings\' filler for levelling the substrate.', c:'ccFiller' },
    { q:'Can the filler be used on tiles and clinker?', a:'Yes. CC Filler can be used on tiles and clinker, provided the surface is first prepared and then primed. It is used to level tiles, clinker and joints before applying microcement.', c:'ccFiller' },
    { q:'Should primer be applied between layers?', a:'Yes. Primer must be applied before each layer to ensure optimal adhesion.', c:'ccFiller' },
    { q:'How is filler applied?', a:'CC Filler is applied with a trowel in an even and uniform layer.', c:'ccFiller' },
    { q:'How much water should be added to the filler?', a:'Mix 350–400 g of cold water per 1,000 g of CC Filler.', c:'ccFiller' },
    { q:'How many layers of filler should be applied?', a:'As a general rule, two even layers of CC Filler are applied.', c:'ccFiller' },
    { q:'How long should the filler dry?', a:'The drying time for CC Filler is 1–3 hours per layer, depending on temperature and humidity.', c:'ccFiller' },
    { q:'How long can the filler be worked?', a:'CC Filler has a pot life of approx. 30–40 minutes after mixing. Therefore, only mix the amount needed for the current layer.', c:'ccFiller' },
    { q:'Can you achieve a terrazzo look with Flakes?', a:'Yes. Our Flakes are small flakes that are mixed into CC Filler. When the surface is subsequently sanded, the flakes are exposed, creating a beautiful terrazzo look.', c:'ccFillerFlakes' },
    { q:'How do you create a terrazzo look?', a:'A terrazzo look is created by mixing Flakes into the CC Filler filler compound. The compound is applied with a trowel and sanded when dry, so the flakes become visible.', c:'ccFillerFlakes' },
    { q:'Can you achieve a terrazzo look in the bathroom?', a:'Yes. A terrazzo look can be done in bathrooms, provided the build-up is carried out according to our guidelines.', c:'ccFillerFlakes' },
    { q:'Can you achieve a terrazzo look on walls?', a:'Yes. With Flakes you can create a terrazzo look on walls and virtually any other solid surface.', c:'ccFillerFlakes' },
    { q:'Can you achieve a terrazzo look on floors?', a:'Yes. With Flakes you can create a terrazzo look on floors and virtually any other solid surface.', c:'ccFillerFlakes' },
    { q:'Can you create a terrazzo look on top of tiles?', a:'Yes. With Flakes you can create a terrazzo look on top of tiles and virtually any other solid surface, provided the substrate is properly prepared.', c:'ccFillerFlakes' },
    { q:'How are Flakes mixed in?', a:'Flakes are added to CC Filler and mixed gently and evenly before the filler is applied.', c:'ccFillerFlakes' },
    { q:'How much Flakes should be added to achieve a terrazzo look?', a:'Add 10 % Flakes in relation to the amount of CC Filler.', c:'ccFillerFlakes' },
    { q:'How long should the filler with Flakes dry?', a:'The drying time is 1–3 hours per layer, depending on temperature and humidity.', c:'ccFillerFlakes' },
    { q:'Which surfaces can you create a terrazzo look on?', a:'A terrazzo look can be created on floors, walls, countertops, tiles and clinker. At Contec Coating, a terrazzo look is achieved by mixing Flakes into CC Filler.', c:'ccFillerFlakes' },
    { q:'How much does a terrazzo look cost?', a:'The price depends on the size and build-up of the project. You can calculate your project and get a total price along with a matching guide.', c:'ccFillerFlakes' },
    { q:'Can you create a terrazzo look in coloured concrete?', a:'Yes. Both Color colour pigment and Flakes can be added to the same mix, so you achieve a coloured terrazzo look.', c:'ccFillerFlakes' },
    { q:'What is a self-levelling compound?', a:'Our self-levelling compound, CC Flow, is a self-levelling filler used to level and flatten floors.', c:'ccFlow' },
    { q:'When should you use a self-levelling compound?', a:'A self-levelling compound is used when uneven floors need to be levelled to create a flat and horizontal surface. CC Flow can be applied in layers of up to 10 mm per layer.', c:'ccFlow' },
    { q:'What does it mean that the compound is self-levelling?', a:'Self-levelling means that the compound flows out by itself and distributes evenly over the substrate. However, to achieve a perfectly flat surface, it is recommended to work the compound with a spiked roller, which also removes air bubbles.', c:'ccFlow' },
    { q:'How is a self-levelling compound mixed?', a:'CC Flow is mixed with a dissolver (whisk) in a bucket for at least 3 minutes until the compound is smooth and lump-free.', c:'ccFlow' },
    { q:'How is a self-levelling compound applied?', a:'Pour the compound onto the floor and distribute it roughly with a rake, notched trowel or similar. Apply several mixes quickly one after another so they flow together wet-on-wet. Finish with a spiked roller to level the surface and remove air bubbles.', c:'ccFlow' },
    { q:'How thick a layer of self-levelling compound can be applied?', a:'CC Flow can be applied in layers of up to 10 mm per layer.', c:'ccFlow' },
    { q:'How long does CC Flow take to dry?', a:'The drying time is approx. 8 hours before the next work step can be carried out.', c:'ccFlow' },
    { q:'How long can CC Flow be worked with?', a:'The pot life is approx. 20–30 minutes after mixing.', c:'ccFlow' },
    { q:'How much does a self-levelling compound cost?', a:'The price depends on the size of the project and the layer thickness. You can calculate your project and get a total price along with a matching guide.', c:'ccFlow' },
    { q:'What does "self-levelling" mean?', a:'It means that the compound is so fluid that it almost levels itself by gravity. However, to achieve an optimal result, it is recommended to use a spiked roller.', c:'ccFlow' },
    { q:'Can you apply several layers of self-levelling compound on top of each other?', a:'Yes. The first layer must be completely dry, and the substrate must be primed again before the next layer is applied. CC Flow can be applied in layers of up to 10 mm per layer.', c:'ccFlow' },
    { q:'How much self-levelling compound do I need per square metre of floor?', a:'The consumption of CC Flow is approx. 1.8 kg per m² per mm of layer thickness.', c:'ccFlow' },
    { q:'What is the difference between self-levelling concrete, self-levelling mortar and self-levelling compound?', a:'The terms are often used interchangeably, but there is a difference. Self-levelling concrete is the coarsest type and contains gravel or chippings, making it suitable for layer thicknesses of up to approx. 100 mm. Self-levelling compound has the finest particles and is typically used in layers of up to approx. 10 mm. Self-levelling mortar sits between the two and can be used in medium layer thicknesses.', c:'ccFlow' },
    { q:'Can you apply microcement yourself?', a:'Yes, many people can apply microcement themselves. We recommend following our customised guides step by step to achieve the best result.', c:'pure' },
    { q:'How many coats of microcement should be applied?', a:'At least two coats of microcement should be applied.', c:'pure' },
    { q:'Does microcement need to be sealed?', a:'Yes, microcement must always be sealed to protect the surface against water, dirt and wear.', c:'pure' },
    { q:'Is PURE Contec Coatings\' microcement?', a:'Yes, PURE is Contec Coatings\' microcement product.', c:'pure' },
    { q:'How is microcement applied?', a:'PURE is applied in thin coats. Between coats, the surface is lightly sanded and primed again before the next coat is applied. Contec Coatings PURE can be applied with a paint roller, which makes the process simpler than traditional microcement, which is normally applied with a trowel.', c:'pure' },
    { q:'What tools are needed to apply microcement?', a:'The first coat of PURE is always applied with a paint roller. The second coat can be applied with a paint roller, trowel or sponge, depending on the desired look.', c:'pure' },
    { q:'How long does microcement take to dry?', a:'The drying time is typically 1–3 hours per coat, depending on temperature and humidity.', c:'pure' },
    { q:'Does microcement need to be sanded between coats?', a:'Yes, PURE is lightly sanded between coats to remove small imperfections and ensure a uniform surface.', c:'pure' },
    { q:'How much water should be added to microcement?', a:'For PURE, 330–420 g of cold water is added per 1,000 g of product. This does not necessarily apply to other microcement products.', c:'pure' },
    { q:'How long can microcement be used after mixing?', a:'PURE has a pot life of approx. 4–8 hours after mixing. This does not necessarily apply to other microcement products.', c:'pure' },
    { q:'How much does microcement cost?', a:'The price depends on the size and structure of the project. You can calculate your project and get a total price along with a matching guide.', c:'pure' },
    { q:'How should microcement be sanded?', a:'PURE is lightly sanded with sandpaper, typically grit 40–120. The choice of grit size depends on the surface and the desired result.', c:'pure' },
    { q:'Can you change the finish of microcement?', a:'Yes. The finish can be changed when applying the second coat of PURE. A paint roller gives a more uniform look, while a trowel or sponge creates more texture and variation.', c:'pure' },
    { q:'What is the surface of microcement like?', a:'Microcement is the solution that comes closest to a genuine cast concrete floor. The surface has a natural colour play and feels and behaves more like concrete than plastic or paint.', c:'pure' },
    { q:'How is microcement maintained?', a:'Maintenance depends on the sealer that protects the surface. A pH-neutral cleaning agent should always be used, and sand and gravel should be vacuumed or swept away to avoid scratches.', c:'pure' },
    { q:'What are the substrate requirements for microcement?', a:'The substrate must be stable, solid, flat, dry, crack-free and free of dust, grease, oil and loose paint. Before applying microcement, the substrate must be primed to ensure optimal adhesion.', c:'pure' },
    { q:'Can you colour microcement?', a:'Yes, microcement can be coloured with our colour pigment Color, which is mixed with PURE.', c:'color' },
    { q:'What colours are available for microcement?', a:'Microcement is available in a range of different colours. You can see the full colour range in our colour catalogue or visualise the colours directly in your own home with our visualisation tool.', c:'color' },
    { q:'Can you mix colour into microcement yourself?', a:'Yes, you can mix colour into microcement yourself, as long as our guide is followed.', c:'color' },
    { q:'Should Color be mixed directly into the microcement?', a:'No. Color should not be added directly to PURE. First shake the dry powder pigment thoroughly, then mix it with a smaller portion of the water, and finally add the coloured water to the microcement.', c:'color' },
    { q:'Should Color be shaken before use?', a:'Yes. The dry powder pigment should be shaken thoroughly before use to avoid lumps.', c:'color' },
    { q:'Should you test the colour before applying microcement?', a:'Yes. We always recommend testing the colour on a small area first, so you can be sure the result is as desired.', c:'color' },
    { q:'Does Color affect drying time and pot life?', a:'No. Color does not affect either the drying time or the pot life of PURE.', c:'color' },
    { q:'How much Color is in the colours from the colour catalogue?', a:'All colours in our colour catalogue are based on 2 % Color in PURE, equivalent to 20 g Color per 1,000 g PURE. However, you can add up to 6 % Color if you want a stronger colour.', c:'color' },
    { q:'What is the maximum amount of colour that can be added to microcement?', a:'A maximum of 6 % Color may be added to PURE, equivalent to 60 g Color per 1,000 g PURE.', c:'color' },
    { q:'Can you see pictures of the different colours for inspiration?', a:'Yes. You can find inspiration on our inspiration page, but the best way to choose a colour is to use our visualisation tool, where you can see the colours directly in your own home.', c:'color' },
    { q:'Does microcement need to be sealed?', a:'Yes, microcement must always be sealed to protect the surface against water, dirt and wear.', c:'universalSealer' },
    { q:'Which sealer should be used for microcement?', a:'It depends on the project. Universal Sealer is a breathable sealer suitable for e.g. outdoor use, basement walls and other surfaces where the material needs to breathe. In wet rooms and other areas with high water exposure, a denser build-up with WP Base and PU Top must be used.', c:'universalSealer' },
    { q:'What is sealer used for on microcement?', a:'Sealer protects the microcement and makes the surface more resistant to water, dirt and wear.', c:'universalSealer' },
    { q:'What is Universal Sealer used for?', a:'Universal Sealer is used as a breathable seal on microcement on surfaces where moisture needs to pass through the construction.', c:'universalSealer' },
    { q:'Does Universal Sealer need to be mixed with water?', a:'No. Universal Sealer is ready to use and should not be mixed with water.', c:'universalSealer' },
    { q:'How is Universal Sealer applied?', a:'Universal Sealer is applied in a thin and even layer with a short-pile roller or lacquer roller.', c:'universalSealer' },
    { q:'How many coats of Universal Sealer should be applied?', a:'We recommend two coats of Universal Sealer.', c:'universalSealer' },
    { q:'How much Universal Sealer should be used per m²?', a:'We recommend a consumption of 100 g Universal Sealer per m² per coat.', c:'universalSealer' },
    { q:'How long does Universal Sealer take to dry?', a:'Drying time is typically 1–3 hours per coat, depending on temperature and humidity.', c:'universalSealer' },
    { q:'Can Universal Sealer be used alone in wet rooms?', a:'No. Universal Sealer is a breathable sealer and must never be used alone in wet rooms. In wet rooms, a dense seal with WP Base and PU Top must be used.', c:'universalSealer' },
    { q:'Can microcement be made water-repellent with sealer?', a:'Yes. With the right sealer build-up, microcement can be made water-repellent. In wet rooms, WP Base is used followed by PU Top. Note that the substrate must always contain an approved wet-room membrane.', c:'wpBase' },
    { q:'How is microcement sealed in wet rooms?', a:'In wet rooms, microcement is sealed with two coats of WP Base and finished with two coats of PU Top. Note that the substrate must always contain an approved wet-room membrane.', c:'wpBase' },
    { q:'What is the difference between breathable sealer and waterproof wet-room sealer?', a:'A breathable sealer allows the surface to breathe and is used e.g. outdoors, in basements and on walls. A wet-room sealer completely seals the surface and makes it waterproof, which is necessary in wet rooms.', c:'wpBase' },
    { q:'How many coats of sealer does microcement need in wet rooms?', a:'In wet rooms, two coats of WP Base are applied followed by two coats of PU Top.', c:'wpBase' },
    { q:'Can microcement withstand water in bathrooms?', a:'Yes. Microcement can be used in bathrooms when the surface is first sealed with WP Base and then with PU Top. Note that the substrate must always contain an approved wet-room membrane.', c:'wpBase' },
    { q:'What is the difference between sealer and topcoat for microcement?', a:'The sealer protects and seals the surface, while the topcoat is the final layer that provides the ultimate protection and finish.', c:'wpBase' },
    { q:'What is WP Base?', a:'WP Base is a sealer for microcement, used in wet rooms and other areas with high water exposure.', c:'wpBase' },
    { q:'When should WP Base be used?', a:'WP Base is used when microcement needs to be sealed in bathrooms, wet rooms and other places where the surface must be waterproof. Note that the substrate must always contain an approved wet-room membrane.', c:'wpBase' },
    { q:'Can WP Base be used in wet rooms?', a:'Yes. WP Base is used in wet rooms as a base under PU Top. Note that the substrate must always contain an approved wet-room membrane.', c:'wpBase' },
    { q:'How is WP Base mixed?', a:'WP Base is mixed in a 1:1 ratio between component A and B. Mix thoroughly without whipping air into the mixture.', c:'wpBase' },
    { q:'Can WP Base be diluted with water?', a:'No. WP Base must not be diluted with water.', c:'wpBase' },
    { q:'How is WP Base applied?', a:'WP Base is applied in very thin and even coats with a short-pile roller or lacquer roller.', c:'wpBase' },
    { q:'How many coats of WP Base should be applied?', a:'Two coats of WP Base should be applied.', c:'wpBase' },
    { q:'How much WP Base should be used per m²?', a:'Calculate a consumption of approx. 100 g WP Base per m² per coat.', c:'wpBase' },
    { q:'How long does WP Base take to dry?', a:'WP Base is dry after approx. 1 hour.', c:'wpBase' },
    { q:'How long can WP Base be worked with after mixing?', a:'WP Base has a pot life of approx. 2 hours after mixing. After that, the product begins to cure and should no longer be used.', c:'wpBase' },
    { q:'What is topcoat for microcement?', a:'Topcoat is the top, final and elastic seal that protects the microcement and the underlying base seal against UV radiation, water, dirt, scratches and wear.', c:'puTop' },
    { q:'What is PU Top used for?', a:'PU Top is used as the final topcoat on microcement when the surface needs a strong, durable and water-repellent protection.', c:'puTop' },
    { q:'When should PU Top be used?', a:'PU Top is applied after WP Base when a dense, elastic and strong seal is desired.', c:'puTop' },
    { q:'Must PU Top be used after WP Base?', a:'Yes. PU Top is used as the final topcoat on top of WP Base.', c:'puTop' },
    { q:'Can PU Top be used in wet rooms?', a:'Yes. PU Top is used in wet rooms as the final topcoat on top of WP Base. Note that the substrate must always contain an approved wet-room membrane.', c:'puTop' },
    { q:'What is the mixing ratio for PU Top?', a:'PU Top is mixed in a 1:1 ratio between component A and B. Only mix the amount you need.', c:'puTop' },
    { q:'May topcoat be diluted with water?', a:'No. PU Top must not be diluted with water.', c:'puTop' },
    { q:'How many coats of topcoat does microcement need?', a:'We recommend at least two coats of PU Top to achieve optimal protection.', c:'puTop' },
    { q:'How long does topcoat take to dry on microcement?', a:'PU Top is typically dry after approx. 20 minutes.', c:'puTop' },
    { q:'Can microcement withstand water after topcoat?', a:'Yes. When microcement is properly sealed with WP Base and PU Top, the surface can withstand water. In wet rooms, the substrate must always be built with an approved wet-room membrane.', c:'puTop' },
    { q:'How is topcoat applied?', a:'PU Top is applied in very thin and even coats with a short-pile roller or lacquer roller.', c:'puTop' },
    { q:'How many coats of PU Top should be applied?', a:'At least two coats of PU Top should be applied.', c:'puTop' },
    { q:'How much PU Top should be used per m²?', a:'Calculate a consumption of approx. 100 g PU Top per m² per coat.', c:'puTop' },
    { q:'How long does PU Top take to dry?', a:'PU Top is typically dry after approx. 20 minutes.', c:'puTop' },
    { q:'How long can PU Top be worked with after mixing?', a:'PU Top has a pot life of approx. 40 minutes after mixing. After that, the product begins to cure and should no longer be used.', c:'puTop' },
  ],
  de: [
    { q:'Was ist Contec Coating?', a:'Contec Coating ist ein hochfester Betonbinder, der eine dichte und strapazierfähige Oberfläche für den Innen- und Außenbereich bietet.' },
    { q:'Wo befinden Sie sich?', a:'Wir befinden uns in Axel Kiers Vej 30, 8270 Højbjerg - DK.' },
    { q:'Wie lange gibt es Sie schon?', a:'Unser Produkt wurde früher zur Qualitätssicherung der von uns gegossenen Oberflächen verwendet und existiert daher seit 2008 als internes Qualitätssicherungsprodukt.' },
    { q:'Was unterscheidet Sie von Wettbewerbern?', a:'Wir sind die einfache und schnelle Wahl – mit unserem System kommen Sie schneller von A nach B als mit herkömmlichem Mikrozement.' },
    { q:'Arbeiten Sie in ganz Dänemark?', a:'Ja, auch außerhalb der Landesgrenzen.' },
    { q:'Bieten Sie Beratung vor Beginn an?', a:'Ja, Sie können uns gerne anrufen oder schreiben: info@conteccoating.dk oder +45 86280290.' },
    { q:'Kann man Sie besuchen oder Lösungen sehen?', a:'Sie können einen Termin in unserem Showroom in Aarhus, Axel Kiers Vej 30, 8270 Højbjerg - DK vereinbaren. Schreiben Sie an info@conteccoating.dk oder rufen Sie +45 86280290 an.' },
    { q:'Bieten Sie Muster oder Testflächen an?', a:'Nein, leider nicht. Aber Sie können ein Starterkit kaufen und günstig Muster anfertigen.' },
    { q:'Sind Ihre Lösungen UV-beständig?', a:'Ja.' },
    { q:'Kann Contec Coating im Außenbereich verwendet werden?', a:'Ja, aber im Außenbereich darf nur Sealer-Lösung 1 verwendet werden, da sie diffusionsoffen ist.' },
    { q:'Sind Sonderfarben möglich?', a:'Ja, mit der COLOR-Serie können Sie Ihre eigene, ganz individuelle Farbe erstellen.' },
    { q:'Welche Oberflächen können behandelt werden?', a:'Alle festen Untergründe.' },
    { q:'Welche Lösungen eignen sich für Nassräume?', a:'Ja, man muss lediglich mit der Nassraumlösung abschließen, WP BASE x2 und PU TOP x2. Danach wird die Pflege mit CC CARE empfohlen.' },
    { q:'Wann kann das Badezimmer benutzt werden?', a:'Sie können nach mindestens 24 Stunden duschen. Beachten Sie zudem die gesetzlichen Vorschriften für die Inbetriebnahme des Badezimmers entsprechend den Anforderungen des Nassraumsilikons.' },
    { q:'Welche Systeme sind am pflegeleichtesten?', a:'Sealer-Lösung 2 oder 3, da sie mit CC Sealer PU TOP abgeschlossen werden.' },
    { q:'Kann man einen Terrazzo-Look erzielen?', a:'Ja, mit Contec Coating FLAKES kann man einen Terrazzo-Look erzielen.' },
    { q:'Kann das Produkt in einem Keller verwendet werden?', a:'Ja, wenn Feuchtigkeit im Keller oder aufsteigende Feuchtigkeit aus dem Untergrund vorhanden ist, muss die Sealer-Lösung diffusionsoffen sein und daher wird nur UNIVERSAL SEALER als abschließender Sealer verwendet.' },
    { q:'Kann es auf Verschleißbeton aufgetragen werden?', a:'Ja, das kann man. Es wird empfohlen, die Oberfläche vor Beginn leicht anzuschleifen.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und Beton-Look?', a:'Beton-Look beschreibt das Aussehen. Mikrozement ist das Produkt, das verwendet werden kann, um diesen Ausdruck zu erzeugen.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und New Yorker Boden?', a:'New Yorker Boden beschreibt einen Stil mit einem rohen Betonausdruck. Mikrozement ist das Produkt, das verwendet werden kann, um diesen Ausdruck zu erzeugen.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und Epoxid?', a:'Mikrozement ist eine zementbasierte, mineralische Oberfläche mit einem natürlichen Beton-Look. Epoxid ist ein synthetisches Kunststoffprodukt, das typischerweise ein künstlicheres Aussehen hat.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und Polyurethan?', a:'Mikrozement ist ein zementbasiertes Produkt, das einen rohen Beton-Look bietet, während Polyurethan ein kunststoff-/gummibasiertes Produkt ist.' },
    { q:'Was ist am klimafreundlichsten: Mikrozement, Polyurethan oder Epoxid?', a:'Mikrozement ist die klimafreundlichste Wahl. Es ist ein Naturprodukt auf Basis von Zement, Quarzsand und natürlichen Mineralien. Sowohl Polyurethan als auch Epoxid sind synthetische Kunststoffprodukte (Polymere), die aus Öl hergestellt werden, was zu einem deutlich höheren Energieverbrauch und CO2-Fußabdruck bei der Herstellung führt.' },
    { q:'Gibt es einen Unterschied im Arbeitsklima bei der Arbeit mit Mikrozement, Polyurethan oder Epoxid?', a:'Ja. Mikrozement ist typischerweise die schonendste Wahl bei der Anwendung, da es hauptsächlich zementbasiert ist. Epoxid und Polyurethan bergen größere chemische Risiken und erfordern umfangreichere Schutzmaßnahmen, Belüftung und Sicherheitsvorkehrungen.' },
    { q:'Ist Mikrozement umweltfreundlich?', a:'Mikrozement ist nicht umweltneutral, kann aber eine umweltfreundliche Wahl für Renovierungen sein, vor allem weil es Ressourcen und Abfall spart. Das Material selbst hat einen CO₂-Fußabdruck in der Zementproduktion, aber die Gesamtauswirkung auf die Umwelt ist oft begrenzt, wenn man die Anwendung betrachtet. Contec Coatings Mikrozement wird in sehr dünnen Schichten aufgetragen, was zu einem deutlich geringeren CO₂-Fußabdruck im Vergleich zu alternativen Produkten führt.' },
    { q:'Wie langlebig ist Mikrozement?', a:'Mikrozement ist eine starke Oberfläche, die in Wohnungen, Gewerbe- und stark beanspruchten Bereichen verwendet werden kann.' },
    { q:'Wo wird der Mikrozement produziert?', a:'Contec Coatings Mikrozement wird in Dänemark entwickelt und produziert, als separate Produktserie, basierend auf mehr als 30 Jahren professioneller Erfahrung mit Hochfestbetontechnologie.' },
    { q:'Besteht aller Mikrozement aus denselben Materialien?', a:'Nein, Mikrozement besteht nicht immer aus denselben Materialien. Es variiert von Hersteller zu Hersteller. Unser Mikrozement PURE basiert auf Hochfestbeton und hat daher typischerweise die doppelte Abrieb- und Druckfestigkeit im Vergleich zu herkömmlichem Mikrozement.' },
    { q:'Gibt es einen Unterschied in der Auftragsmethode je nach Produktlieferant?', a:'Ja, es kann große Unterschiede geben. Viele Arten von Mikrozement müssen mit einem Spachtel aufgetragen werden und erfordern in einigen Fällen ein Bewehrungsnetz. Contec Coatings Mikrozement PURE kann in dünnen Schichten mit einer Farbrolle aufgetragen werden, was den Prozess wesentlich einfacher macht.' },
    { q:'Gibt es einen Preisunterschied je nach Produktlieferant?', a:'Ja, es kann große Preisunterschiede geben. Es hängt unter anderem von der Schichtdicke, dem Verbrauch, der Anzahl der Produkte und wie einfach der Prozess ist ab. Contec Coatings Mikrozement wird in dünnen Schichten aufgetragen und kann daher eine sehr kostengünstige Lösung sein.' },
    { q:'Gibt es einen Festigkeitsunterschied zwischen verschiedenen Mikrozementarten?', a:'Ja, es kann sehr große Unterschiede in der Abrieb- und Druckfestigkeit geben. Unser Mikrozement PURE basiert auf Hochfestbeton und hat daher typischerweise die doppelte Abrieb- und Druckfestigkeit im Vergleich zu herkömmlichem Mikrozement.' },
    { q:'Was ist Mikrozement?', a:'Mikrozement ist eine dünne zementbasierte Oberflächenbehandlung, die verwendet werden kann, um einen rohen Beton-Look zu erzeugen.' },
    { q:'Wofür wird Mikrozement verwendet?', a:'Mikrozement ist eine dünne zementbasierte Oberflächenbehandlung, die typischerweise auf Böden, Wänden, Badezimmern, Arbeitsplatten, Möbeln und anderen Oberflächen verwendet wird, wo ein Beton-Look gewünscht wird.' },
    { q:'Was ist Beton-Look?', a:'Beton-Look ist ein Stil, der den Ausdruck von rohem Beton nachahmt. Er kann mit verschiedenen Materialien erreicht werden, z.B. Mikrozement, Epoxid, Polyurethan, Spachtelmasse oder Farbe.' },
    { q:'Was ist ein New Yorker Boden?', a:'Ein New Yorker Boden ist ein Boden mit einem rohen und industriellen Beton-Look, inspiriert von den Böden alter Fabrikgebäude.' },
    { q:'Welche Materialien werden für einen New Yorker Boden verwendet?', a:'Ein New Yorker Boden kann mit mehreren Materialien hergestellt werden, z.B. polierter Beton, Mikrozement, Epoxid oder Polyurethan.' },
    { q:'Gibt es New Yorker Böden nur in Grau?', a:'Nein, New Yorker Böden werden oft mit grauem Beton-Look in Verbindung gebracht, aber sie können in jeder Farbe aus unserem Farbkatalog hergestellt werden.' },
    { q:'Kann man einen New Yorker Boden selbst herstellen?', a:'Ja, man kann einen New Yorker-inspirierten Boden selbst mit Mikrozement herstellen. Sie können Ihr eigenes Projekt hier durchführen und eine Anleitung für Ihr Projekt im Start-Projekt erhalten.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und echtem Beton?', a:'Beton wird normalerweise in dicken Schichten gegossen. Mikrozement ist ein dünner zementbasierter Belag, der einen Beton-Look bietet, ohne einen neuen Betonboden gießen zu müssen.' },
    { q:'Was ist der Unterschied zwischen Mikrozement und Effektfarbe?', a:'Mikrozement ist ein zementbasierter Belag, der zu einer starken Oberfläche aushärtet. Effektfarbe ist Farbe, die den Beton-Look nur visuell nachahmt, aber ohne die gleiche Robustheit.', c:'generalFaq' },
    { q:'Was ist der Unterschied zwischen Mikrozement, Beton-Look und New Yorker Boden?', a:'Viele verwechseln die Begriffe. Beton-Look und New Yorker Boden sind Ausdrücke und Stile, während Mikrozement ein Material ist.', c:'generalFaq' },
    { q:'Ist Mikrozement ein Material oder nur ein Aussehen?', a:'Mikrozement ist ein Material. Es ist ein dünner zementbasierter Belag, der verwendet werden kann, um einen Beton-Look zu erzeugen.', c:'generalFaq' },
    { q:'Muss Mikrozement Zement enthalten?', a:'Ja, echter Mikrozement muss zementbasiert sein. Wenn das Produkt hauptsächlich auf Epoxid, Polyurethan, Acryl oder anderen kunststoffbasierten Bindemitteln basiert, ist es kein Mikrozementprodukt, sondern typischerweise ein Kunststoffprodukt.', c:'generalFaq' },
    { q:'Was ist hochfester Mikrozement?', a:'Hochfester Mikrozement ist eine stärkere Art von Mikrozement, bei der die Oberfläche auf Hochfestbetontechnologie statt auf herkömmlichem Mikrozement basiert. Dies verleiht der Oberfläche eine deutlich höhere Abrieb- und Druckfestigkeit.', c:'generalFaq' },
    { q:'Warum kann Contec Coatings Mikrozement mit einer Farbrolle aufgetragen werden?', a:'Contec Coatings PURE ist mit sehr kleinen Partikelgrößen und einer einzigartigen Fließfähigkeit entwickelt worden, sodass es in ultradünnen Schichten mit einer Farbrolle aufgetragen werden kann. Das macht den Prozess einfacher als bei herkömmlichem Mikrozement, der oft gespachtelt werden muss.', c:'generalFaq' },
    { q:'Was bedeutet Coating?', a:'Coating ist eine Oberflächenbehandlung, bei der eine dünne dekorative oder schützende Schicht auf ein Material aufgetragen wird, um sein Aussehen, seine Eigenschaften und seine Lebensdauer zu verbessern.', c:'generalFaq' },
    { q:'Ist Mikrozement dasselbe wie Beton?', a:'Nein. Obwohl Mikrozement dem echten Beton im Aussehen am nächsten kommt, ist es nicht dasselbe. Beton ist ein konstruktives und tragendes Material mit größeren Zuschlagstoffen, während Mikrozement ein dekoratives Oberflächenprodukt ist, bei dem die Zuschlagstoffe zu ultrafeinen Partikeln zermahlen werden.', c:'generalFaq' },
    { q:'Sind Mikrozement und Microbeton dasselbe?', a:'Ja. Im Alltag werden beide Bezeichnungen für dieselbe Art von Produkt verwendet, da beide aus viel feineren Partikeln bestehen als traditioneller Beton.', c:'generalFaq' },
    { q:'Warum heißt es Mikrozement?', a:'Der Name ist eigentlich etwas irreführend, da die Zementpartikel dieselben sind wie in normalem Beton. Der Unterschied besteht darin, dass die anderen Zuschlagstoffe zu ultrafeinen Partikeln zermahlen werden. Daher ist Microbeton vielleicht ein treffenderer Name, obwohl beide Bezeichnungen im Alltag verwendet werden.', c:'generalFaq' },
    { q:'Was ist eine mineralische Oberfläche?', a:'Eine mineralische Oberfläche ist eine Oberfläche, bei der die sichtbare Schicht hauptsächlich aus anorganischen Materialien wie Zement, Kalk, Sand und Stein besteht. Das Gegenteil ist eine kunststoff- oder organisch basierte Oberfläche, bei der die Bindemittel hauptsächlich aus synthetischen Materialien bestehen.', c:'generalFaq' },
    { q:'Was ist ein Mikrozementboden?', a:'Ein Mikrozementboden ist ein Boden mit einem dünnen zementbasierten Belag, der eine starke Oberfläche und einen rohen Beton-Look bietet.', c:'gulv' },
    { q:'Kann Mikrozement auf Böden verwendet werden?', a:'Ja, Mikrozement eignet sich sowohl für private Häuser als auch für gewerbliche Böden, vorausgesetzt es gibt einen robusten und stabilen Untergrund.', c:'gulv' },
    { q:'Was ist der Unterschied zwischen einem Mikrozementboden und einem Epoxidboden?', a:'Mikrozement ist zementbasiert und bietet einen natürlichen Beton-Look. Epoxid ist kunststoffbasiert und bietet ein künstlicheres Aussehen.', c:'gulv' },
    { q:'Was ist der Unterschied zwischen einem Mikrozementboden und einem Polyurethanboden?', a:'Mikrozement ist zementbasiert und bietet einen natürlichen Beton-Look. Polyurethan ist kunststoffbasiert und bietet ein künstlicheres Aussehen.', c:'gulv' },
    { q:'Was ist der Unterschied zwischen einem Mikrozementboden und einem New Yorker Boden?', a:'New Yorker Boden beschreibt einen rohen Beton-Look. Mikrozement ist ein Material, das verwendet werden kann, um diesen Ausdruck zu erzeugen.', c:'gulv' },
    { q:'Kann man einen Beton-Look-Boden mit Mikrozement erstellen?', a:'Ja, Mikrozement eignet sich gut für die Erstellung eines Beton-Looks auf Böden.', c:'gulv' },
    { q:'Kann Mikrozement auf Fliesen auf Böden verwendet werden?', a:'Ja, Mikrozement kann auf Fliesen verwendet werden, sodass man den Boden erneuern kann, ohne die alten Fliesen zu entfernen.', c:'gulv' },
    { q:'Kann Mikrozement auf Badezimmerböden verwendet werden?', a:'Ja, Mikrozement kann auf Badezimmerböden verwendet werden, wenn er nach unseren Richtlinien aufgetragen wird.', c:'gulv' },
    { q:'Kann Mikrozement auf Küchenböden verwendet werden?', a:'Ja, Mikrozement kann auf Küchenböden verwendet werden und hält der täglichen Nutzung stand, wenn er nach unseren Richtlinien aufgetragen wird.', c:'gulv' },
    { q:'Kann Mikrozement auf Betonböden verwendet werden?', a:'Ja, Beton ist ein geeigneter Untergrund für Mikrozement.', c:'gulv' },

    { q:'Wofür wird Primer verwendet?', a:'Primer sorgt für eine optimale Haftung auf dem Untergrund, bevor die nachfolgenden Schichten aufgetragen werden.', c:'ccPrimer' },
    { q:'Wann sollte Primer verwendet werden?', a:'Primer wird vor unserem PURE Mikrozement, CC Filler Spachtelmasse und CC Flow Fließestrich sowie zwischen den Schichten aufgetragen, um eine optimale Haftung zu gewährleisten.', c:'ccPrimer' },
    { q:'Muss man immer Primer vor Mikrozement verwenden?', a:'Ja, vor dem Auftragen unseres PURE Mikrozements muss immer grundiert werden.', c:'ccPrimer' },
    { q:'Muss Primer mit Wasser gemischt werden?', a:'Ja. Mischen Sie den Primer im Verhältnis 1:1 auf nicht-saugenden Untergründen und 1:3 auf saugenden Untergründen. Ein saugender Untergrund nimmt Flüssigkeit auf, z. B. Beton oder Spachtelmasse, während ein nicht-saugender Untergrund kaum Flüssigkeit aufnimmt, z. B. Fliesen und Klinker. Testen Sie den Untergrund mit einem Wassertropfen – perlt das Wasser, ist der Untergrund nicht-saugend, und wird es aufgesaugt, ist der Untergrund saugend.', c:'ccPrimer' },
    { q:'Wie viel Primer sollte pro m² verwendet werden?', a:'Es sollten mindestens 100 g Primer pro m² verwendet werden.', c:'ccPrimer' },
    { q:'Wie lange muss Primer trocknen?', a:'Der Primer hat eine Trocknungszeit von ca. 1 Stunde, bevor die nächste Schicht aufgetragen werden kann.', c:'ccPrimer' },
    { q:'Wie viele Schichten Primer sollten aufgetragen werden?', a:'Primer wird in einer dünnen und gleichmäßigen Schicht aufgetragen. Wenn nicht mindestens 100 g Primer pro m² aufgetragen wurden, sollte eine zusätzliche Schicht aufgetragen werden.', c:'ccPrimer' },
    { q:'Welche Temperatur ist erforderlich?', a:'Die Temperatur muss während des Auftragens und Trocknens mindestens 10 °C betragen.', c:'ccPrimer' },
    { q:'Was ist der Unterschied zwischen saugenden und nicht-saugenden Untergründen?', a:'Ein saugender Untergrund nimmt Flüssigkeit auf, z. B. Beton oder Spachtelmasse. Ein nicht-saugender Untergrund nimmt kaum Flüssigkeit auf, z. B. Fliesen und Klinker. Testen Sie den Untergrund mit einem Wassertropfen, um zu sehen, ob das Wasser aufgesaugt wird oder auf der Oberfläche perlt.', c:'ccPrimer' },
    { q:'Worauf sollte man beim Auftragen von CC Primer achten?', a:'CC Primer sollte in einer dünnen und gleichmäßigen Schicht aufgetragen werden. Vermeiden Sie, dass sich das Produkt in Pfützen oder Primerseen sammelt, da dies die Haftung und den nachfolgenden Aufbau beeinträchtigen kann.', c:'ccPrimer' },
    { q:'Wird CC Primer nur einmal im Prozess verwendet?', a:'Nein. CC Primer wird nicht nur am Anfang verwendet. Er muss auch vor und zwischen den Schichten beim Auftragen von PURE Mikrozement, CC Filler und CC Flow verwendet werden.', c:'ccPrimer' },
    { q:'Muss der Untergrund vor dem Grundieren sauber sein?', a:'Ja. Der Untergrund muss fest, sauber und frei von Staub, Schmutz und losen Partikeln sein, bevor der Primer aufgetragen wird. Dies sorgt für die bestmögliche Haftung.', c:'ccPrimer' },
    { q:'Kann man die Verwendung von Primer weglassen?', a:'Nein. CC Primer ist erforderlich, um sicherzustellen, dass die nächste Schicht korrekt auf dem Untergrund haftet. Dies gilt vor PURE Mikrozement, CC Filler und CC Flow.', c:'ccPrimer' },
    { q:'Muss man Primer auf Fliesen vor Mikrozement verwenden?', a:'Ja. Fliesen sind typischerweise ein nicht-saugender Untergrund und müssen daher grundiert werden, bevor Mikrozement aufgetragen wird. CC Primer sorgt für eine optimale Haftung.', c:'ccPrimer' },
    { q:'Muss man Primer auf Beton vor Mikrozement verwenden?', a:'Ja. Beton ist typischerweise ein saugender Untergrund und muss daher grundiert werden, bevor Mikrozement aufgetragen wird. CC Primer sorgt für eine optimale Haftung auf dem Beton.', c:'ccPrimer' },
    { q:'Muss man Primer auf Spachtelmasse vor Mikrozement verwenden?', a:'Ja. Spachtelmasse ist typischerweise ein saugender Untergrund und muss daher grundiert werden, bevor Mikrozement aufgetragen wird. CC Primer sorgt für eine optimale Haftung auf der Spachtelmasse.', c:'ccPrimer' },
    { q:'Kann CC Primer mit anderen Werkzeugen als einer Rolle aufgetragen werden?', a:'Ja. Eine Rolle wird für die meisten Projekte empfohlen, da sie das Auftragen des Primers in einer dünnen und gleichmäßigen Schicht erleichtert. Auf einigen Untergründen kann der Primer auch mit Sprühe, Gießkanne, Besen oder Pinsel aufgetragen werden, solange er gleichmäßig verteilt wird und sich nicht in Pfützen oder Primerseen sammelt.', c:'ccPrimer' },
    { q:'Was ist CC Filler?', a:'CC Filler ist eine Spachtelmasse, die zum Einebnen des Untergrunds vor dem Auftragen von Mikrozement verwendet wird.', c:'ccFiller' },
    { q:'Wann sollte die Spachtelmasse verwendet werden?', a:'Die Spachtelmasse wird verwendet, wenn der Untergrund uneben ist und vor dem Auftragen von Mikrozement geebnet werden muss. CC Filler ist die Spachtelmasse von Contec Coatings zum Einebnen des Untergrunds.', c:'ccFiller' },
    { q:'Kann die Spachtelmasse auf Fliesen und Klinker verwendet werden?', a:'Ja. CC Filler kann auf Fliesen und Klinker verwendet werden, sofern die Oberfläche vorbereitet und anschließend grundiert wird. Er wird zum Einebnen von Fliesen, Klinker und Fugen vor dem Auftragen von Mikrozement verwendet.', c:'ccFiller' },
    { q:'Sollte zwischen den Schichten grundiert werden?', a:'Ja. Vor jeder Schicht muss grundiert werden, um eine optimale Haftung zu gewährleisten.', c:'ccFiller' },
    { q:'Wie wird Spachtelmasse aufgetragen?', a:'CC Filler wird mit einem Spachtel in einer gleichmäßigen und einheitlichen Schicht aufgetragen.', c:'ccFiller' },
    { q:'Wie viel Wasser sollte der Spachtelmasse zugegeben werden?', a:'Mischen Sie 350–400 g kaltes Wasser pro 1.000 g CC Filler.', c:'ccFiller' },
    { q:'Wie viele Schichten Spachtelmasse sollten aufgetragen werden?', a:'Als Grundregel werden zwei gleichmäßige Schichten CC Filler aufgetragen.', c:'ccFiller' },
    { q:'Wie lange muss die Spachtelmasse trocknen?', a:'Die Trocknungszeit für CC Filler beträgt 1–3 Stunden pro Schicht, abhängig von Temperatur und Luftfeuchtigkeit.', c:'ccFiller' },
    { q:'Wie lange kann die Spachtelmasse verarbeitet werden?', a:'CC Filler hat eine Verarbeitungszeit von ca. 30–40 Minuten nach dem Anmischen. Mischen Sie daher nur die Menge an, die für die aktuelle Schicht benötigt wird.', c:'ccFiller' },
    { q:'Kann man mit Flakes einen Terrazzo-Look erzielen?', a:'Ja. Unsere Flakes sind kleine Flocken, die in CC Filler eingemischt werden. Wenn die Oberfläche anschließend geschliffen wird, werden die Flocken freigelegt, sodass ein schöner Terrazzo-Look entsteht.', c:'ccFillerFlakes' },
    { q:'Wie erstellt man einen Terrazzo-Look?', a:'Ein Terrazzo-Look wird erstellt, indem Flakes in die Spachtelmasse CC Filler eingemischt werden. Die Masse wird mit einem Spachtel aufgetragen und geschliffen, wenn sie trocken ist, sodass die Flocken sichtbar werden.', c:'ccFillerFlakes' },
    { q:'Kann man einen Terrazzo-Look im Badezimmer erzielen?', a:'Ja. Ein Terrazzo-Look kann in Badezimmern ausgeführt werden, wenn der Aufbau nach unseren Anleitungen erfolgt.', c:'ccFillerFlakes' },
    { q:'Kann man einen Terrazzo-Look auf Wänden erzielen?', a:'Ja. Mit Flakes können Sie einen Terrazzo-Look auf Wänden und nahezu allen anderen festen Oberflächen erzeugen.', c:'ccFillerFlakes' },
    { q:'Kann man einen Terrazzo-Look auf Böden erzielen?', a:'Ja. Mit Flakes können Sie einen Terrazzo-Look auf Böden und nahezu allen anderen festen Oberflächen erzeugen.', c:'ccFillerFlakes' },
    { q:'Kann man einen Terrazzo-Look auf Fliesen erzielen?', a:'Ja. Mit Flakes können Sie einen Terrazzo-Look auf Fliesen und nahezu allen anderen festen Oberflächen erzeugen, sofern der Untergrund richtig vorbereitet wird.', c:'ccFillerFlakes' },
    { q:'Wie werden Flakes eingemischt?', a:'Flakes werden zu CC Filler hinzugefügt und vorsichtig und gleichmäßig eingemischt, bevor die Spachtelmasse aufgetragen wird.', c:'ccFillerFlakes' },
    { q:'Wie viel Flakes sollten zugegeben werden, um einen Terrazzo-Look zu erzielen?', a:'Es werden 10 % Flakes im Verhältnis zur Menge an CC Filler zugegeben.', c:'ccFillerFlakes' },
    { q:'Wie lange muss die Spachtelmasse mit Flakes trocknen?', a:'Die Trocknungszeit beträgt 1–3 Stunden pro Schicht, abhängig von Temperatur und Luftfeuchtigkeit.', c:'ccFillerFlakes' },
    { q:'Auf welchen Oberflächen kann man einen Terrazzo-Look erzeugen?', a:'Ein Terrazzo-Look kann auf Böden, Wänden, Arbeitsplatten, Fliesen und Klinker erzeugt werden. Bei Contec Coating wird der Terrazzo-Look durch das Einmischen von Flakes in CC Filler erzielt.', c:'ccFillerFlakes' },
    { q:'Wie viel kostet ein Terrazzo-Look?', a:'Der Preis hängt von der Größe und dem Aufbau des Projekts ab. Sie können Ihr Projekt berechnen und einen Gesamtpreis sowie eine passende Anleitung erhalten.', c:'ccFillerFlakes' },
    { q:'Kann man einen Terrazzo-Look in farbigem Beton erzielen?', a:'Ja. Es können sowohl Color-Farbpigment als auch Flakes in derselben Mischung zugegeben werden, sodass ein farbiger Terrazzo-Look entsteht.', c:'ccFillerFlakes' },
    { q:'Was ist Fließspachtel?', a:'Unser Fließspachtel, CC Flow, ist eine selbstnivellierende Spachtelmasse, die zum Einebnen und Planieren von Böden verwendet wird.', c:'ccFlow' },
    { q:'Wann sollte man Fließspachtel verwenden?', a:'Fließspachtel wird verwendet, wenn unebene Böden ausgeglichen werden müssen, um einen ebenen und waagerechten Untergrund zu schaffen. CC Flow kann in Schichten von bis zu 10 mm pro Schicht aufgetragen werden.', c:'ccFlow' },
    { q:'Was bedeutet es, dass der Spachtel selbstnivellierend ist?', a:'Selbstnivellierend bedeutet, dass die Masse von selbst fließt und sich gleichmäßig über den Untergrund verteilt. Um eine völlig ebene Oberfläche zu erzielen, wird jedoch empfohlen, die Masse mit einer Stachelrolle zu bearbeiten, die gleichzeitig Lufteinschlüsse entfernt.', c:'ccFlow' },
    { q:'Wie wird Fließspachtel gemischt?', a:'CC Flow wird mit einem Dissolver (Quirl) in einem Eimer mindestens 3 Minuten lang gemischt, bis die Masse glatt und klumpenfrei ist.', c:'ccFlow' },
    { q:'Wie wird Fließspachtel aufgetragen?', a:'Gießen Sie die Masse auf den Boden und verteilen Sie sie grob mit einem Rechen, Zahnpachtel oder Ähnlichem. Bringen Sie mehrere Mischungen schnell nacheinander auf, damit sie nass in nass zusammenfließen. Beenden Sie mit einer Stachelrolle, um die Oberfläche zu einebnen und Lufteinschlüsse zu entfernen.', c:'ccFlow' },
    { q:'Wie dick kann eine Schicht Fließspachtel aufgetragen werden?', a:'CC Flow kann in Schichten von bis zu 10 mm pro Schicht aufgetragen werden.', c:'ccFlow' },
    { q:'Wie lange muss CC Flow trocknen?', a:'Die Trocknungszeit beträgt ca. 8 Stunden, bevor der nächste Arbeitsschritt durchgeführt werden kann.', c:'ccFlow' },
    { q:'Wie lange kann CC Flow verarbeitet werden?', a:'Die Verarbeitungszeit beträgt ca. 20–30 Minuten nach dem Mischen.', c:'ccFlow' },
    { q:'Wie viel kostet Fließspachtel?', a:'Der Preis hängt von der Größe des Projekts und der Schichtdicke ab. Sie können Ihr Projekt berechnen und einen Gesamtpreis sowie eine passende Anleitung erhalten.', c:'ccFlow' },
    { q:'Was bedeutet „selbstnivellierend“?', a:'Das bedeutet, dass die Masse so dünnflüssig ist, dass sie sich fast von selbst durch die Schwerkraft nivelliert. Um ein optimales Ergebnis zu erzielen, wird jedoch die Verwendung einer Stachelrolle empfohlen.', c:'ccFlow' },
    { q:'Kann man mehrere Schichten Fließspachtel übereinander auftragen?', a:'Ja. Die erste Schicht muss vollständig trocken sein und der Untergrund muss erneut grundiert werden, bevor die nächste Schicht aufgetragen wird. CC Flow kann in Schichten von bis zu 10 mm pro Schicht aufgetragen werden.', c:'ccFlow' },
    { q:'Wie viel Fließspachtel benötige ich pro Quadratmeter Boden?', a:'Der Verbrauch von CC Flow beträgt ca. 1,8 kg pro m² pro mm Schichtdicke.', c:'ccFlow' },
    { q:'Was ist der Unterschied zwischen Fließbeton, Fließmörtel und Fließspachtel?', a:'Die Begriffe werden oft synonym verwendet, aber es gibt Unterschiede. Fließbeton ist die gröbste Sorte und enthält Kies oder Splitt, was ihn für Schichtdicken von bis zu ca. 100 mm geeignet macht. Fließspachtel hat die feinsten Partikel und wird typischerweise in Schichten von bis zu ca. 10 mm verwendet. Fließmörtel liegt dazwischen und kann in mittleren Schichtdicken verwendet werden.', c:'ccFlow' },
    { q:'Kann man Microcement selbst auftragen?', a:'Ja, viele können Microcement selbst auftragen. Wir empfehlen, unseren maßgeschneiderten Anleitungen Schritt für Schritt zu folgen, um das beste Ergebnis zu erzielen.', c:'pure' },
    { q:'Wie viele Schichten Microcement müssen aufgetragen werden?', a:'Es müssen mindestens zwei Schichten Microcement aufgetragen werden.', c:'pure' },
    { q:'Muss Microcement versiegelt werden?', a:'Ja, Microcement muss immer versiegelt werden, um die Oberfläche vor Wasser, Schmutz und Verschleiß zu schützen.', c:'pure' },
    { q:'Ist PURE Contec Coatings\' Microcement?', a:'Ja, PURE ist das Microcement-Produkt von Contec Coatings.', c:'pure' },
    { q:'Wie wird Microcement aufgetragen?', a:'PURE wird in dünnen Schichten aufgetragen. Zwischen den Schichten wird die Oberfläche leicht geschliffen und erneut grundiert, bevor die nächste Schicht aufgetragen wird. Contec Coatings PURE kann mit einer Farbrolle aufgetragen werden, was den Prozess einfacher macht als traditionelles Microcement, das normalerweise mit einem Spachtel aufgetragen wird.', c:'pure' },
    { q:'Welche Werkzeuge benötigt man zum Auftragen von Microcement?', a:'Die erste Schicht PURE wird immer mit einer Farbrolle aufgetragen. Die zweite Schicht kann mit einer Farbrolle, einem Spachtel oder einem Schwamm aufgetragen werden, je nach dem gewünschten Aussehen.', c:'pure' },
    { q:'Wie lange muss Microcement trocknen?', a:'Die Trocknungszeit beträgt typischerweise 1–3 Stunden pro Schicht, abhängig von Temperatur und Luftfeuchtigkeit.', c:'pure' },
    { q:'Muss Microcement zwischen den Schichten geschliffen werden?', a:'Ja, PURE wird zwischen den Schichten leicht geschliffen, um kleine Unebenheiten zu entfernen und eine gleichmäßige Oberfläche zu gewährleisten.', c:'pure' },
    { q:'Wie viel Wasser muss dem Microcement zugesetzt werden?', a:'Für PURE werden 330–420 g kaltes Wasser pro 1.000 g Produkt zugesetzt. Dies gilt nicht unbedingt für andere Microcement-Produkte.', c:'pure' },
    { q:'Wie lange kann Microcement nach dem Mischen verarbeitet werden?', a:'PURE hat eine Verarbeitungszeit von ca. 4–8 Stunden nach dem Mischen. Dies gilt nicht unbedingt für andere Microcement-Produkte.', c:'pure' },
    { q:'Wie viel kostet Microcement?', a:'Der Preis hängt von der Größe und Struktur des Projekts ab. Sie können Ihr Projekt berechnen und einen Gesamtpreis sowie eine passende Anleitung erhalten.', c:'pure' },
    { q:'Wie soll Microcement geschliffen werden?', a:'PURE wird leicht mit Schmirgelpapier geschliffen, typischerweise Körnung 40–120. Die Wahl der Körnung hängt von der Oberfläche und dem gewünschten Ergebnis ab.', c:'pure' },
    { q:'Kann man die Oberflächenbeschaffenheit von Microcement verändern?', a:'Ja. Die Oberflächenbeschaffenheit kann beim Auftragen der zweiten Schicht PURE verändert werden. Eine Farbrolle ergibt ein gleichmäßigeres Aussehen, während ein Spachtel oder Schwamm mehr Struktur und Variation schafft.', c:'pure' },
    { q:'Wie ist die Oberfläche von Microcement?', a:'Microcement ist die Lösung, die einem echten gegossenen Betonboden am nächsten kommt. Die Oberfläche hat ein natürliches Farbspiel und fühlt sich an sowie verhält sich mehr wie Beton als wie Kunststoff oder Farbe.', c:'pure' },
    { q:'Wie wird Microcement gepflegt?', a:'Die Pflege hängt von dem Versiegler ab, der die Oberfläche schützt. Es sollte immer ein pH-neutrales Reinigungsmittel verwendet werden, und Sand und Kies sollten abgesaugt oder gefegt werden, um Kratzer zu vermeiden.', c:'pure' },
    { q:'Welche Anforderungen gibt es an den Untergrund für Microcement?', a:'Der Untergrund muss stabil, fest, eben, trocken, rissfrei und frei von Staub, Fett, Öl und loser Farbe sein. Vor dem Auftragen von Microcement muss der Untergrund grundiert werden, um eine optimale Haftung zu gewährleisten.', c:'pure' },
    { q:'Kann man Microcement einfärben?', a:'Ja, Microcement kann mit unserem Farbpigment Color eingefärbt werden, das mit PURE gemischt wird.', c:'color' },
    { q:'Welche Farben gibt es für Microcement?', a:'Microcement ist in einer Reihe verschiedener Farben erhältlich. Sie können die gesamte Farbpalette in unserem Farbkatalog sehen oder die Farben direkt in Ihrem eigenen Zuhause mit unserem Visualisierungswerkzeug visualisieren.', c:'color' },
    { q:'Kann man selbst Farbe in Microcement mischen?', a:'Ja, man kann selbst Farbe in Microcement mischen, solange unsere Anleitung befolgt wird.', c:'color' },
    { q:'Muss Color direkt in den Microcement gemischt werden?', a:'Nein. Color sollte nicht direkt zu PURE hinzugefügt werden. Schütteln Sie zuerst das trockene Pulverpigment gründlich, mischen Sie es dann mit einem kleineren Teil des Wassers, und fügen Sie schließlich das eingefärbte Wasser zum Microcement hinzu.', c:'color' },
    { q:'Muss Color vor der Verwendung geschüttelt werden?', a:'Ja. Das trockene Pulverpigment sollte vor der Verwendung gründlich geschüttelt werden, um Klumpen zu vermeiden.', c:'color' },
    { q:'Sollte man die Farbe testen, bevor man Microcement aufträgt?', a:'Ja. Wir empfehlen immer, die Farbe zuerst auf einer kleinen Fläche zu testen, damit Sie sicher sind, dass das Ergebnis wie gewünscht ausfällt.', c:'color' },
    { q:'Beeinflusst Color die Trocknungszeit und Verarbeitungszeit?', a:'Nein. Color beeinflusst weder die Trocknungszeit noch die Verarbeitungszeit von PURE.', c:'color' },
    { q:'Wie viel Color ist in den Farben aus dem Farbkatalog enthalten?', a:'Alle Farben in unserem Farbkatalog basieren auf 2 % Color in PURE, entsprechend 20 g Color pro 1.000 g PURE. Sie können jedoch bis zu 6 % Color hinzufügen, wenn Sie eine intensivere Farbe wünschen.', c:'color' },
    { q:'Wie viel Farbe darf maximal zum Microcement hinzugefügt werden?', a:'Es dürfen maximal 6 % Color zu PURE hinzugefügt werden, entsprechend 60 g Color pro 1.000 g PURE.', c:'color' },
    { q:'Kann man Bilder der verschiedenen Farben zur Inspiration sehen?', a:'Ja. Sie finden Inspiration auf unserer Inspirationsseite, aber die beste Möglichkeit, eine Farbe zu wählen, ist unser Visualisierungswerkzeug, mit dem Sie die Farben direkt in Ihrem eigenen Zuhause sehen können.', c:'color' },
    { q:'Muss Microcement versiegelt werden?', a:'Ja, Microcement muss immer versiegelt werden, um die Oberfläche vor Wasser, Schmutz und Verschleiß zu schützen.', c:'universalSealer' },
    { q:'Welche Versiegelung sollte für Microcement verwendet werden?', a:'Es hängt vom Projekt ab. Universal Sealer ist eine atmungsaktive Versiegelung, die sich z. B. für den Außenbereich, Kellerwände und andere Oberflächen eignet, bei denen das Material atmen muss. In Feuchträumen und anderen Bereichen mit hoher Wasserbelastung muss ein dichterer Aufbau mit WP Base und PU Top verwendet werden.', c:'universalSealer' },
    { q:'Wofür wird Versiegelung bei Microcement verwendet?', a:'Versiegelung schützt den Microcement und macht die Oberfläche widerstandsfähiger gegen Wasser, Schmutz und Verschleiß.', c:'universalSealer' },
    { q:'Wofür wird Universal Sealer verwendet?', a:'Universal Sealer wird als atmungsaktive Versiegelung von Microcement auf Oberflächen verwendet, bei denen Feuchtigkeit durch die Konstruktion dringen muss.', c:'universalSealer' },
    { q:'Muss Universal Sealer mit Wasser gemischt werden?', a:'Nein. Universal Sealer ist gebrauchsfertig und sollte nicht mit Wasser gemischt werden.', c:'universalSealer' },
    { q:'Wie wird Universal Sealer aufgetragen?', a:'Universal Sealer wird in einer dünnen und gleichmäßigen Schicht mit einer kurzflorigen Rolle oder Lackrolle aufgetragen.', c:'universalSealer' },
    { q:'Wie viele Schichten Universal Sealer sollten aufgetragen werden?', a:'Wir empfehlen zwei Schichten Universal Sealer.', c:'universalSealer' },
    { q:'Wie viel Universal Sealer sollte pro m² verwendet werden?', a:'Wir empfehlen einen Verbrauch von 100 g Universal Sealer pro m² pro Schicht.', c:'universalSealer' },
    { q:'Wie lange muss Universal Sealer trocknen?', a:'Die Trocknungszeit beträgt typischerweise 1–3 Stunden pro Schicht, abhängig von Temperatur und Luftfeuchtigkeit.', c:'universalSealer' },
    { q:'Kann Universal Sealer allein in Feuchträumen verwendet werden?', a:'Nein. Universal Sealer ist eine atmungsaktive Versiegelung und darf niemals allein in Feuchträumen verwendet werden. In Feuchträumen muss eine dichte Versiegelung mit WP Base und PU Top verwendet werden.', c:'universalSealer' },
    { q:'Kann Microcement mit Versiegelung wasserabweisend gemacht werden?', a:'Ja. Mit dem richtigen Versiegelungsaufbau kann Microcement wasserabweisend gemacht werden. In Feuchträumen wird WP Base gefolgt von PU Top verwendet. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'wpBase' },
    { q:'Wie wird Microcement in Feuchträumen versiegelt?', a:'In Feuchträumen wird Microcement mit zwei Schichten WP Base versiegelt und mit zwei Schichten PU Top abgeschlossen. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'wpBase' },
    { q:'Was ist der Unterschied zwischen atmungsaktiver Versiegelung und wasserdichter Feuchtraumversiegelung?', a:'Eine atmungsaktive Versiegelung lässt die Oberfläche atmen und wird z. B. im Außenbereich, in Kellern und an Wänden verwendet. Eine Feuchtraumversiegelung schließt die Oberfläche vollständig ab und macht sie wasserdicht, was in Feuchträumen erforderlich ist.', c:'wpBase' },
    { q:'Wie viele Schichten Versiegelung benötigt Microcement in Feuchträumen?', a:'In Feuchträumen werden zwei Schichten WP Base aufgetragen, gefolgt von zwei Schichten PU Top.', c:'wpBase' },
    { q:'Kann Microcement Wasser im Badezimmer standhalten?', a:'Ja. Microcement kann in Badezimmern verwendet werden, wenn die Oberfläche zuerst mit WP Base und danach mit PU Top versiegelt wird. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'wpBase' },
    { q:'Was ist der Unterschied zwischen Versiegelung und Topcoat bei Microcement?', a:'Die Versiegelung schützt und schließt die Oberfläche, während der Topcoat die abschließende Schicht ist, die den endgültigen Schutz und die Endbeschaffenheit bietet.', c:'wpBase' },
    { q:'Was ist WP Base?', a:'WP Base ist eine Versiegelung für Microcement, die in Feuchträumen und anderen Bereichen mit hoher Wasserbelastung verwendet wird.', c:'wpBase' },
    { q:'Wann sollte WP Base verwendet werden?', a:'WP Base wird verwendet, wenn Microcement in Badezimmern, Feuchträumen und anderen Bereichen versiegelt werden muss, in denen die Oberfläche wasserdicht sein muss. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'wpBase' },
    { q:'Kann WP Base in Feuchträumen verwendet werden?', a:'Ja. WP Base wird in Feuchträumen als Basis unter PU Top verwendet. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'wpBase' },
    { q:'Wie wird WP Base gemischt?', a:'WP Base wird im Verhältnis 1:1 zwischen Komponente A und B gemischt. Mischen Sie gründlich, ohne Luft in die Mischung einzuschlagen.', c:'wpBase' },
    { q:'Darf WP Base mit Wasser verdünnt werden?', a:'Nein. WP Base darf nicht mit Wasser verdünnt werden.', c:'wpBase' },
    { q:'Wie wird WP Base aufgetragen?', a:'WP Base wird in sehr dünnen und gleichmäßigen Schichten mit einer kurzflorigen Rolle oder Lackrolle aufgetragen.', c:'wpBase' },
    { q:'Wie viele Schichten WP Base sollten aufgetragen werden?', a:'Es sollten zwei Schichten WP Base aufgetragen werden.', c:'wpBase' },
    { q:'Wie viel WP Base sollte pro m² verwendet werden?', a:'Rechnen Sie mit einem Verbrauch von ca. 100 g WP Base pro m² pro Schicht.', c:'wpBase' },
    { q:'Wie lange muss WP Base trocknen?', a:'WP Base ist nach ca. 1 Stunde trocken.', c:'wpBase' },
    { q:'Wie lange kann WP Base nach dem Mischen verarbeitet werden?', a:'WP Base hat eine Topfzeit von ca. 2 Stunden nach dem Mischen. Danach beginnt das Produkt auszuhärten und sollte nicht mehr verwendet werden.', c:'wpBase' },
    { q:'Was ist Topcoat für Microcement?', a:'Topcoat ist die oberste, abschließende und elastische Versiegelung, die den Microcement und die darunterliegende Basisversiegelung vor UV-Strahlung, Wasser, Schmutz, Kratzern und Verschleiß schützt.', c:'puTop' },
    { q:'Wofür wird PU Top verwendet?', a:'PU Top wird als abschließender Topcoat auf Microcement verwendet, wenn die Oberfläche einen starken, verschleißfesten und wasserabweisenden Schutz benötigt.', c:'puTop' },
    { q:'Wann sollte PU Top verwendet werden?', a:'PU Top wird nach WP Base aufgetragen, wenn eine dichte, elastische und starke Versiegelung gewünscht wird.', c:'puTop' },
    { q:'Muss PU Top nach WP Base verwendet werden?', a:'Ja. PU Top wird als abschließender Topcoat auf WP Base verwendet.', c:'puTop' },
    { q:'Kann PU Top in Feuchträumen verwendet werden?', a:'Ja. PU Top wird in Feuchträumen als abschließender Topcoat auf WP Base verwendet. Beachten Sie, dass der Untergrund immer eine zugelassene Feuchtraummembran enthalten muss.', c:'puTop' },

function renderFaq(){
  var ln = lang || 'da';
  if (faqHTML !== null && faqLang === ln) return faqHTML;
  var T = t();
  var items = FAQ_DATA[ln] || FAQ_DATA.da;
  var html = '<div class="faq-panel"><h3>' + T.faqTitle + '</h3>';
  html += '<input class="faq-search" id="faqSearchInput" type="text" placeholder="' + T.faqSearch + '" oninput="renderFaqResults()" />';
  html += '<div class="faq-list" id="faqResults">';
  html += buildFaqGroupedHTML(items, ln);
  html += '</div></div>';
  faqHTML = html;
  faqLang = ln;

function buildFaqGroupedHTML(items, ln){
  var groups = {};
  var order = [];
  for (var i = 0; i < items.length; i++) {
    var cat = items[i].c || 'general';
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push({ item: items[i], idx: i });
  }
  var catOrder = ['general','generalFaq','gulv','vægge','badevaerelse','bordplader','eksterior','industri','moebler','trapper','ccPrimer','ccFiller','ccFillerFlakes','ccFlow','pure','color','universalSealer','wpBase','puTop'];
  order.sort(function(a,b){
    var ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return a.localeCompare(b);
  });
  var html = '';
  for (var oi = 0; oi < order.length; oi++) {
    var catKey = order[oi];
    var catLabel = (FAQ_CAT_LABELS[catKey] && FAQ_CAT_LABELS[catKey][ln]) || (FAQ_CAT_LABELS[catKey] && FAQ_CAT_LABELS[catKey].en) || catKey;
    html += '<div class="faq-cat-label">' + catLabel + '</div>';
    var grp = groups[catKey];
    for (var gi = 0; gi < grp.length; gi++) {
      var g = grp[gi];
      html += '<div class="faq-item' + (faqOpenItems[g.idx] ? ' open' : '') + '" id="faqItem' + g.idx + '"><button class="faq-q" onclick="toggleFaqItem(' + g.idx + ')"><span>' + g.item.q + '</span><span class="chev">&#9660;</span></button><div class="faq-a">' + g.item.a + '</div></div>';
    }
  }
  return html;
}

var faqOpenItems = {};
function toggleFaqItem(i){
  faqOpenItems[i] = !faqOpenItems[i];
  var el = document.getElementById('faqItem' + i);
  if (el){
    if (faqOpenItems[i]) el.classList.add('open');
    else el.classList.remove('open');
  }
}

function renderFaqResults(){
  var inp = document.getElementById('faqSearchInput');
  var query = (inp ? inp.value : '').toLowerCase().trim();
  var items = FAQ_DATA[lang] || FAQ_DATA.da;
  var container = document.getElementById('faqResults');
  if (!container) return;
  if (!query){
    container.innerHTML = buildFaqGroupedHTML(items, lang);
    return;
  }
  var filtered = [];
  for (var i = 0; i < items.length; i++){
    if (items[i].q.toLowerCase().indexOf(query) >= 0 || items[i].a.toLowerCase().indexOf(query) >= 0){
      filtered.push({item: items[i], idx: i});
    }
  }
  if (!filtered.length){
    container.innerHTML = '<div class="faq-empty">' + (t().faqEmpty) + '</div>';
    return;
  }
  var html = '';
  for (var fi2 = 0; fi2 < filtered.length; fi2++) {
    var f = filtered[fi2];
    var fi = f.idx;
    html += '<div class="faq-item' + (faqOpenItems[fi] ? ' open' : '') + '" id="faqItem' + fi + '"><button class="faq-q" onclick="toggleFaqItem(' + fi + ')"><span>' + f.item.q + '</span><span class="chev">&#9660;</span></button><div class="faq-a">' + f.item.a + '</div></div>';
  }
  container.innerHTML = html;
}

function buildShoppingListText(){
  const T = t();
  const r = compute();
  if (!r) return '';
  const isTerrazzo = state.look === 'terrazzo';
  const sealerLabel = !state.sealer ? '–' : T.sealerLbl[state.sealer];
  const surfaceLabel = T.surfaceLabels[state.surface] || '';
  const envSuffix = state.environment==='udendors' ? ' / '+T.envLabels.udendors : state.environment==='indendors' ? ' / '+T.envLabels.indendors : '';
  const substrateLabel = state.substrate ? (state.surface==='vaadrum' ? T.subLabelsWet : T.subLabels)[state.substrate] : '–';
  const lines = [];
  lines.push(T.dealerMsgIntro);
  lines.push('');
  lines.push(`• ${T.sumProject}: ${surfaceLabel}${envSuffix}`);
  lines.push(`• ${T.sumSubstrate}: ${substrateLabel}`);
  lines.push(`• ${T.dealerMsgArea}: ${r.area} m²`);
  lines.push(`• ${T.dealerMsgLook}: ${isTerrazzo?T.lookTerrazzo:T.lookBeton}`);
  lines.push(`• ${T.dealerMsgColor}: ${state.colors.length?state.colors.join(', '):'–'}`);
  lines.push(`• ${T.dealerMsgSealer}: ${sealerLabel}`);
  lines.push('');
  lines.push(T.dealerMsgList+':');
  for (const g of r.shopping){
    for (const ln of g.lines) lines.push(`- ${ln.count}x ${ln.name} (${formatPrice(ln.subtotal)})`);
  }
  for (const cl of r.colorShopping){
    lines.push(`- ${cl.count}x ${cl.name} (${formatPrice(cl.total)})`);
  }
  lines.push('');
  lines.push(`${T.dealerMsgTotal}: ${formatPrice(r.total)}`);
  return lines.join('\n');
}

function doDealerSearch(){
  const q = (state.dealerQuery||'').trim();
  if (!q){ state.dealerError = true; state.dealerResults = null; render(); return; }
  const filter = state.dealerFilter || 'alle';
  const res = findNearestDealers(q, 5, filter);
  if (!res || res.length===0){ state.dealerError = true; state.dealerResults = null; }
  else { state.dealerError = false; state.dealerResults = res; }
  render();
}

function setDealerFilter(val){
  state.dealerFilter = val;
  if (state.dealerResults && state.dealerResults.length) {
    doDealerSearch();
  } else {
    render();
  }
}

function copyShoppingList(){

}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
}

  if (showAllProjects) {
    showAllProjects = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    showRestartConfirmDialog = true;
    render();
    return;
  }
  restartAfterSave = false;
  doRestart();
}

function confirmVizColors(){

  var collected = [];
  for (var i = 0; i < activeSurfaces.length; i++) {
    var c = getVizSurfaceColor(activeSurfaces[i]);

    state.colors = collected;

function getAllowedVizSurfaces(){
  if (state.vizIsFront) return null;
  if (state.surface==='gulv') return ['gulv'];
  if (state.surface==='trapper') return ['trappe'];
  if (state.surface==='vaeg') return ['vaeg'];
  if (state.surface==='bordplade') return ['bordplade'];
  if (state.surface==='vaadrum') return ['vaeg','gulv'];
  return null;

function getDefaultVizSurfaceType(){

function setVizSurfaceType(k){
  var isFront = state.vizIsFront;
  var allowed = getAllowedVizSurfaces();
  if (allowed && allowed.indexOf(k) === -1) return;
  if (allowed && allowed.length === 1) return;
  var target = isFront ? 'frontVizSurfaceTypes' : 'vizSurfaceTypes';
  const arr = Array.isArray(state[target]) ? state[target].slice() : [];
  const i = arr.indexOf(k);
  if (i>=0){ arr.splice(i,1); } else { arr.push(k); }
  state[target] = arr;
  render();
  if (state.showViz) setTimeout(function(){ bindVizEvents(); }, 50);
}
function hasAnyVizColor(){
  var isFront = state.vizIsFront;
  if (!isFront && state.colors && state.colors.length > 0) return true;
  var active = getActiveVizSurfaces();
  for (var i = 0; i < active.length; i++) {
    var c = getVizSurfaceColor(active[i]);
    if (c) return true;
  }
  return false;
}
function getActiveVizSurfaces(){
  var isFront = state.vizIsFront;
  var arr = isFront ? state.frontVizSurfaceTypes : state.vizSurfaceTypes;
  return Array.isArray(arr) ? arr : [];
}
function getVizSurfaceColor(surfaceKey){
  var isFront = state.vizIsFront;
  if (isFront) {
    if (state.frontVizSurfaceColors && state.frontVizSurfaceColors[surfaceKey]) return state.frontVizSurfaceColors[surfaceKey];
    return null;
  }
  if (state.vizSurfaceColors && state.vizSurfaceColors[surfaceKey]) return state.vizSurfaceColors[surfaceKey];
  return state.colors.length > 0 ? state.colors[0] : null;

function setVizSurfaceColor(surfaceKey, colorLabel){

  var T = t();

  var html = '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;margin-bottom:10px;">';
  html += '<div style="font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">' + label + '</div>';
  if (current) {
    var hex = findColorHex(current) || '#888';
    var imgUrl = COLOR_IMAGES[current];
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;">';
