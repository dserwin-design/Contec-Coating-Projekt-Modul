function toggleGuide(){ state.showGuide = !state.showGuide; render(); if (state.showGuide) setTimeout(function(){ var e = document.getElementById('guideSection'); if (e) e.scrollIntoView({behavior:'smooth'}); }, 100); }

function openVideo(url){
  var existing = document.getElementById('videoModal');
  if (existing) existing.remove();
  var modal = document.createElement('div');
  modal.id = 'videoModal';
  modal.className = 'video-modal open';
  modal.innerHTML = '<button class="close-btn" onclick="closeVideo()">✕</button><video src="'+url+'" controls autoplay playsinline></video>';
  modal.addEventListener('click', function(e){ if (e.target === modal) closeVideo(); });
  document.body.appendChild(modal);
}
function closeVideo(){
  var modal = document.getElementById('videoModal');
  if (modal) { var v = modal.querySelector('video'); if (v) v.pause(); modal.remove(); }
}

function getGuideKey(){
  if (state.surface === 'vaadrum') return 'wetRoom';
  if (state.look === 'terrazzo') return 'flakes';
  if (state.environment === 'udendors' || state.surface === 'mobler') return 'exterior';
  if (state.surface === 'bordplade') return 'countertop';
  if (state.surface === 'vaeg') return 'wall';
  return 'floor';
}
function findColorHex(label){
  const norm = normalizeBetonColor(label);
  if (!norm) return null;
  const row = COLOR_DATA.find(([l])=>l===norm);
  return row ? row[1] : null;
}

function getSteps() {
  const steps = ['intro','surface'];
  if (state.surface && state.surface !== 'vaadrum' && state.surface !== 'mobler') steps.push('environment');
  if (state.surface) steps.push('substrate');
  if (state.surface) steps.push('look');
  if (state.surface) steps.push('color');
  const skipSealer = state.surface === 'bordplade' || state.surface === 'vaadrum' || state.environment === 'udendors' || state.surface === 'mobler';
  if (state.surface && !skipSealer) steps.push('sealer');
  if (state.surface) steps.push('area');
  if (state.surface) steps.push('result');
  return steps;
}
let history = ['intro'];
let current = 'intro';

function go(step) {
  if (step !== current) {
    history.push(step);
    current = step;
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goBack() {
  if (history.length <= 1) return;
  history.pop();
  current = history[history.length-1];
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================ SCREENS ============================ */
function renderProgress() {
  const wizardSteps = getSteps().filter(s => s !== 'intro' && s !== 'result');
  const idx = wizardSteps.indexOf(current);
  const el = document.getElementById('progress');
  if (current === 'intro' || current === 'result' || idx < 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'flex';
  el.innerHTML = wizardSteps.map((s, i) => {
    let cls = 'step-circle';
    if (i < idx) cls += ' done';
    else if (i === idx) cls += ' active';
    const clickable = i < idx ? ` onclick="jumpTo('${s}')"` : '';
    let html = `<div class="${cls}"${clickable}>${i+1}</div>`;
    if (i < wizardSteps.length - 1) {
      html += `<div class="step-line${i < idx ? ' done' : ''}"></div>`;
    }
    return html;
  }).join('');
}
function jumpTo(step) {
  const hi = history.lastIndexOf(step);
  if (hi >= 0) { history = history.slice(0, hi+1); current = step; render(); window.scrollTo({top:0,behavior:'smooth'}); }
}

function render() {
  if (current !== 'intro') stopHeroSlideshow();
  renderProgress();
  if (showAllProjects){
    var tabsEl0 = document.getElementById('projectDropdown');
    if (tabsEl0) tabsEl0.innerHTML = '';
    var dlgEl0 = document.getElementById('saveDialogContainer');
    if (dlgEl0) dlgEl0.innerHTML = '';
    var restartDlgEl0 = document.getElementById('restartDialogContainer');
    if (restartDlgEl0) restartDlgEl0.innerHTML = '';
    document.getElementById('progress').style.display = 'none';
    document.getElementById('backBtn').style.display = 'none';
    var closeWizardBtn0 = document.getElementById('closeWizardBtn');
    if (closeWizardBtn0) closeWizardBtn0.style.display = '';
    document.getElementById('stepLabel').textContent = '';
    const s0 = document.getElementById('screen');
    s0.innerHTML = '';
    return renderAllProjects(s0);
  }
  var tabsEl = document.getElementById('projectDropdown');
  if (tabsEl) {
    var tabsHtml = (current === 'result') ? '' : renderSavedProjectsBlock();
    tabsEl.innerHTML = tabsHtml;
  }
  var resultTabsEl = document.getElementById('resultSavedProjects');
  if (resultTabsEl) {
    resultTabsEl.innerHTML = renderSavedProjectsBlock();
  }
  var dlgEl = document.getElementById('saveDialogContainer');
  if (dlgEl) dlgEl.innerHTML = renderSaveDialog();
  var restartDlgEl = document.getElementById('restartDialogContainer');
  if (restartDlgEl) restartDlgEl.innerHTML = renderRestartConfirmDialog();
  renderDeleteDialogNow();
  document.getElementById('backBtn').style.display = history.length>1 ? '' : 'none';
  document.getElementById('backLabel').textContent = t().back;
  var closeWizardBtn = document.getElementById('closeWizardBtn');
  if (closeWizardBtn) closeWizardBtn.style.display = current !== 'intro' ? '' : 'none';
  const wizardSteps = getSteps().filter(s => s !== 'intro' && s !== 'result');
  const stepNum = current === 'intro' || current === 'result' ? null : wizardSteps.indexOf(current) + 1;
  document.getElementById('stepLabel').textContent = current === 'result' ? t().result : '';
  const s = document.getElementById('screen');

  if (current !== 'intro') {
    stopHeroSlideshow();
  }

  s.innerHTML = '';
  if (current === 'intro') return renderIntro(s);
  if (current === 'surface') return renderSurface(s);
  if (current === 'environment') return renderEnvironment(s);
  if (current === 'substrate') return renderSubstrate(s);
  if (current === 'look') return renderLook(s);
  if (current === 'color') return renderColor(s);
  if (current === 'sealer') return renderSealer(s);
  if (current === 'area') return renderArea(s);
  if (current === 'result') return renderResult(s);
}

var ccHeroShuffleBag = [];
var ccHeroRecentUris = [];
var ccHeroCurrentItem = null;

function getHeroGalleryItems(){
  var items = [];
  var seen = {};

  try {
    GALLERY_CATEGORIES.forEach(function(category){
      var categoryNames = GALLERY_CATEGORY_NAMES[category.key] || {};
      var categoryName = categoryNames[lang] || categoryNames.da || category.key || 'Inspiration';

      category.images.forEach(function(image){
        if (!image || !image.uri || seen[image.uri]) return;

        seen[image.uri] = true;
        items.push({
          uri: image.uri,
          title: cleanGalleryTitle(image.title || 'Contec Coating'),
          category: categoryName
        });
      });
    });
  } catch(e) {
    console.error('Kunne ikke hente inspirationsbilleder:', e);
  }

  return items;
}

function shuffleHeroItems(items){
  var result = items.slice();

  for (var i = result.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = result[i];
    result[i] = result[j];
    result[j] = temp;
  }

  return result;
}

function refillHeroShuffleBag(){
  var items = getHeroGalleryItems();
  var recent = {};

  ccHeroRecentUris.forEach(function(uri){
    recent[uri] = true;
  });

  var fresh = items.filter(function(item){
    return !recent[item.uri] &&
      (!ccHeroCurrentItem || item.uri !== ccHeroCurrentItem.uri);
  });

  var rest = items.filter(function(item){
    return fresh.indexOf(item) === -1 &&
      (!ccHeroCurrentItem || item.uri !== ccHeroCurrentItem.uri);
  });

  ccHeroShuffleBag = shuffleHeroItems(fresh).concat(shuffleHeroItems(rest));
}

function getNextHeroItem(){
  if (!ccHeroShuffleBag.length) refillHeroShuffleBag();

  var next = ccHeroShuffleBag.shift();
  if (!next) return null;

  ccHeroRecentUris.push(next.uri);
  if (ccHeroRecentUris.length > 10) ccHeroRecentUris.shift();

  return next;
}

function stopHeroSlideshow(){
  if (ccHeroSlideTimer) {
    clearInterval(ccHeroSlideTimer);
    ccHeroSlideTimer = null;
  }
}

function applyRandomKenBurns(img) {
  if (!img) return;
  img.style.animation = 'none';
  img.style.transform = 'none';
  img.style.transformOrigin = 'center center';
}

function updateHeroPhotoInfo(item, hide){
  var box = document.getElementById('ccHeroPhotoInfo');
  var category = document.getElementById('ccHeroPhotoCategory');
  var title = document.getElementById('ccHeroPhotoTitle');

  if (!box || !category || !title || !item) return;

  if (hide) {
    box.classList.add('is-changing');
    return;
  }

  category.textContent = item.category || 'Inspiration';
  title.textContent = item.title || 'Contec Coating';
  box.classList.remove('is-changing');
}

function showRandomHeroImage(){
  var img = document.getElementById('ccHeroSlideshow');

  if (!img) {
    stopHeroSlideshow();
    return;
  }

  var next = getNextHeroItem();
  if (!next) return;

  var preload = new Image();

  preload.onload = function(){
    var liveImg = document.getElementById('ccHeroSlideshow');
    if (!liveImg) return;

    updateHeroPhotoInfo(next, true);
    liveImg.classList.add('cc-slide-out');

    setTimeout(function(){
      var currentImg = document.getElementById('ccHeroSlideshow');
      if (!currentImg) return;

      currentImg.src = next.uri;
      currentImg.alt = next.title || 'Contec Coating inspiration';
      ccHeroCurrentImage = next.uri;
      ccHeroCurrentItem = next;

      applyRandomKenBurns(currentImg);

      requestAnimationFrame(function(){
        currentImg.classList.remove('cc-slide-out');
        updateHeroPhotoInfo(next, false);
      });
    }, 500);
  };

  preload.onerror = function(){
    ccHeroShuffleBag = ccHeroShuffleBag.filter(function(item){
      return item.uri !== next.uri;
    });
  };

  preload.src = next.uri;
}

function startHeroSlideshow(){
  stopHeroSlideshow();

  var img = document.getElementById('ccHeroSlideshow');
  if (!img) return;

  var items = getHeroGalleryItems();
  if (!items.length) return;

  // Bland hele billedlisten på ny ved hver sideindlæsning
  var shuffledItems = shuffleHeroItems(items);
  var firstItem = shuffledItems.shift();

  ccHeroCurrentItem = firstItem;
  ccHeroCurrentImage = firstItem.uri;
  ccHeroShuffleBag = shuffledItems;
  ccHeroRecentUris = [firstItem.uri];

  img.src = firstItem.uri;
  img.alt = firstItem.title || 'Contec Coating inspiration';

  updateHeroPhotoInfo(firstItem, false);
ccHeroSlideTimer = setInterval(function(){
    showRandomHeroImage();
  }, 5000);
}

function cleanGalleryTitle(title) {
  var t = title;
  // Remove trailing sequence numbers
  t = t.replace(/\s+\d+$/, '');
  // Remove Danish descriptors "væg" and "Gulv"
  t = t.replace(/\s+væg\b/gi, '');
  t = t.replace(/\s+Gulv\b/gi, '');
  // Remove standalone "Wood" suffix when it's the only descriptor
  t = t.replace(/^(\w+)\s+Wood$/i, '$1');
  // Handle "Location/Room - ColorName" and "Color - spec%" patterns
  var colorRe = /\b(Illume|Drizzly|Drizlly|Nightfall|Alba|Ocean|Tomato|Nature|Vega|Sand)\b/i;
  var parts = t.split(' - ');
  if (parts.length === 2) {
    var left = parts[0].trim();
    var right = parts[1].trim();
    var leftIsColor = colorRe.test(left);
    var rightHasColor = colorRe.test(right);
    if (!leftIsColor && rightHasColor) {
      // Left is location/room, right has color → keep right
      t = right;
    } else if (leftIsColor && /\d+%/.test(right)) {
      // Left is color, right has spec → keep left (the color)
      t = left;
    }
  }
  // Clean up any remaining percentage specs
  t = t.replace(/\s*-\s*\d+(,\d+)?%\s*\w*/g, '');
  t = t.replace(/\s+\d+%(\s+\w+)?/g, '');
  // Clean up whitespace
  t = t.replace(/\s+/g, ' ').trim();
  return t || title;
}

var galleryHTML = null;
var galleryLang = null;
function renderGallery() {
  const ln = lang || 'da';
  if (galleryHTML !== null && galleryLang === ln) return galleryHTML;
  const T = t();
  const sortedCategories = [...GALLERY_CATEGORIES].sort(function(a, b) {
    var an = (GALLERY_CATEGORY_NAMES[a.key] ? (GALLERY_CATEGORY_NAMES[a.key][ln] || a.key) : a.key).toLocaleLowerCase(ln);
    var bn = (GALLERY_CATEGORY_NAMES[b.key] ? (GALLERY_CATEGORY_NAMES[b.key][ln] || b.key) : b.key).toLocaleLowerCase(ln);
    return an.localeCompare(bn, ln);
  });
  var html = '<div class="gallery-section"><h2 class="gallery-heading">' + T.inspiration + '</h2><div class="gallery-body" id="galleryBody">';
  sortedCategories.forEach(function(cat) {
    var catName = GALLERY_CATEGORY_NAMES[cat.key] ? (GALLERY_CATEGORY_NAMES[cat.key][ln] || cat.key) : cat.key;
    var imgCount = cat.images.length;
    html += '<div class="gallery-category collapsed" id="gcat-' + cat.key + '" onclick="expandGalleryCategory(\'' + cat.key + '\')"><div class="gallery-cat-header"><span class="gallery-cat-title">' + catName.toUpperCase() + '</span><div class="gallery-cat-meta"><span class="gallery-cat-count">' + imgCount + '</span><span class="gallery-cat-chev">&#9660;</span></div></div><div class="gallery-scroll">';
    cat.images.forEach(function(img) {
      var cleanTitle = cleanGalleryTitle(img.title);
      html += '<div class="gallery-card" onclick="event.stopPropagation();window.open(\'' + img.uri + '\', \'_blank\')"><div class="img-wrap"><img src="' + img.uri + '" alt="' + cleanTitle + '" loading="lazy" /></div><div class="photo-name">' + cleanTitle + '</div></div>';
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  galleryHTML = html;
  galleryLang = ln;
  return html;
}

function expandGalleryCategory(catKey) {
  var el = document.getElementById('gcat-' + catKey);
  if (!el) return;
  // Toggle expanded/collapsed
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    el.classList.add('collapsed');
  } else {
    el.classList.remove('collapsed');
    el.classList.add('expanded');
    // Scroll to the category after a brief delay to let the layout update
    setTimeout(function() {
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }
}

/* ============================ RESULT ============================ */
function computeForState(snap) {
  var saved = snapshotState();
  restoreState(snap);
  var result = compute();
  restoreState(saved);
  return result;
}

function compute() {
  const area = parseFloat(state.area);
  if (!(area > 0)) return null;
  const isOutdoor = state.environment === 'udendors' || state.surface === 'mobler';
  const sealerKey = isOutdoor ? 'sealer1' : (state.sealer || 'sealer1');
  const sealer = sealerKey === 'sealer2' ? 'universalWithTop' : sealerKey === 'sealer3' ? 'wpBaseWithTop' : 'universal';
  const substrate = state.substrate;
  const extraFiller = substrate==='grov'?200 : substrate==='klinker'?400 : 0;
  const extraSealerBase = isOutdoor ? 0 : (substrate==='klinker'?100 : 0);
  const colors = state.colors;
  const isTerrazzo = state.look === 'terrazzo';

  if (isTerrazzo) {
    const primerL = area * (substrate === 'klinker' ? 0.25 : substrate === 'grov' ? 0.20 : 0.10);
    const fillerKg = area * (substrate === 'klinker' ? 0.9 : substrate === 'grov' ? 0.7 : 0.5);
    const flakesKg = fillerKg * 0.1;
    let uniL=0, baseKg=0, topKg=0;
    if (sealer === 'universal') uniL = area*0.10;
    else if (sealer === 'universalWithTop') { uniL = area*0.10; topKg = area*0.20; }
    else { baseKg = area * (substrate === 'klinker' ? 0.30 : 0.20); topKg = area*0.20; }

    const needs = [];
    needs.push(['CC Primer', primerL.toFixed(2)+' L']);
    needs.push(['CC Filler', fillerKg.toFixed(2)+' kg']);
    needs.push(['Flakes', flakesKg.toFixed(2)+' kg']);
    if (baseKg>0) needs.push(['CC Sealer WP Base', baseKg.toFixed(2)+' kg']);
    if (topKg>0)  needs.push(['CC Sealer PU Top', topKg.toFixed(2)+' kg']);
    if (uniL>0)   needs.push(['Universal Sealer', uniL.toFixed(2)+' L']);
    if (sealer === 'universal' && !isOutdoor) needs.push(['CC Care', '1 stk.']);

    const useEur = lang !== 'da';
    const flakesPrice = getFlakesPrice();
    const ccCarePrice = getCcCarePrice();
    let total = 0;
    const shopping = [];
    const p = getCheapestCombination(primerL, PRODUCT_DB.primer, useEur); total+=p.totalPrice; shopping.push({title:'CC PRIMER', lines:p.lines});
    const f = getCheapestCombination(fillerKg, PRODUCT_DB.filler, useEur); total+=f.totalPrice; shopping.push({title:'CC FILLER', lines:f.lines});
    const names = colors.length ? colors : ['CHAMPAGNE'];
    const share = flakesKg / names.length;
    const fl = [];
    for (const nm of names) {
      const units = Math.max(1, Math.ceil(share / FLAKES_KG_PER_UNIT));
      const sub = units * flakesPrice;
      total += sub;
      fl.push({count:units, name:`Flakes ${nm} - 450 g`, subtotal:sub});
    }
    shopping.push({title:'FLAKES', lines:fl});
    if (baseKg>0) { const c=getCheapestCombination(baseKg, PRODUCT_DB.sealerBase, useEur); total+=c.totalPrice; shopping.push({title:'CC SEALER WP BASE', lines:c.lines}); }
    if (topKg>0)  { const c=getCheapestCombination(topKg,  PRODUCT_DB.sealerTop, useEur);  total+=c.totalPrice; shopping.push({title:'CC SEALER PU TOP', lines:c.lines}); }
    if (uniL>0)   { const c=getCheapestCombination(uniL,   PRODUCT_DB.universal, useEur);  total+=c.totalPrice; shopping.push({title:'UNIVERSAL SEALER', lines:c.lines}); }
    if (sealer === 'universal' && !isOutdoor) { total += ccCarePrice; shopping.push({title:'CC CARE', lines:[{count:1, name:'CC Care 0,5 Ltr.', subtotal:ccCarePrice}]}); }
    return { area, needs, shopping, colorShopping: [], total };
  }

  const normalized = colors.map(c => normalizeBetonColor(c)).filter(Boolean);
  const colorCount = Math.max(1, normalized.length);
  let ccPrimer = area * (substrate === 'klinker' ? 200 : substrate === 'grov' ? 150 : 100);
  let ccFiller = area*extraFiller;
  let ccBase = area*extraSealerBase;
  let ccTop = 0, uni = 0;
  const pure = area*500;
  if (sealer === 'universal') uni = area*100;
  else if (sealer === 'universalWithTop') { uni = area*100; ccTop = area*200; }
  else { ccBase += area*200; ccTop = area*200; }

  const familyAgg = {};
  const pureKgPerColor = (pure/1000) / colorCount;
  for (const n of normalized) {
    const fam = getColorFamily(n);
    if (fam && PRODUCT_DB.color[fam]) {
      const addon = getColorAddonCount(pureKgPerColor);
      if (addon>0) familyAgg[fam] = (familyAgg[fam]||0)+addon;
    }
  }
  const totalAddon = Object.values(familyAgg).reduce((s,n)=>s+n,0);

  const needs = [];
  if (ccPrimer>0) needs.push(['CC Primer', formatKilo(ccPrimer)+' L']);
  if (ccFiller>0) needs.push(['CC Filler', formatKilo(ccFiller)+' kg']);
  if (ccBase>0)   needs.push(['CC Sealer WP Base', formatKilo(ccBase)+' kg']);
  if (ccTop>0)    needs.push(['CC Sealer PU Top', formatKilo(ccTop)+' kg']);
  if (uni>0)      needs.push(['Universal Sealer', formatKilo(uni)+' L']);
  if (sealer === 'universal' && !isOutdoor) needs.push(['CC Care', '1 stk.']);
  if (pure>0)     needs.push(['PURE', formatKilo(pure)+' kg']);
  if (totalAddon>0) needs.push(['COLOR (100 g)', totalAddon+' stk.']);

  const useEur = lang !== 'da';
  const ccCarePrice = getCcCarePrice();
  let total = 0;
  const shopping = [];
  if (pure>0) {
    const toneAgg = {};
    if (normalized.length === 0) toneAgg.Alba = pure/1000;
    else for (const n of normalized) { const tn=getBaseTone(n); toneAgg[tn] = (toneAgg[tn]||0)+pureKgPerColor; }
    for (const tone of Object.keys(toneAgg)) {
      const products = PRODUCT_DB.pure[tone] || PRODUCT_DB.pure.Alba;
      const c = getCheapestCombination(toneAgg[tone], products, useEur);
      total += c.totalPrice; shopping.push({title:`PURE – ${tone}`, lines:c.lines});
    }
  }
  const add = (title, req, list) => { if (req<=0) return; const c=getCheapestCombination(req/1000,list,useEur); total+=c.totalPrice; shopping.push({title, lines:c.lines}); };
  add('CC Primer', ccPrimer, PRODUCT_DB.primer);
  add('CC Filler', ccFiller, PRODUCT_DB.filler);
  add('CC Sealer WP BASE', ccBase, PRODUCT_DB.sealerBase);
  add('CC Sealer PU TOP', ccTop, PRODUCT_DB.sealerTop);
  add('Universal Sealer', uni, PRODUCT_DB.universal);
  if (sealer === 'universal' && !isOutdoor) { total += ccCarePrice; shopping.push({title:'CC CARE', lines:[{count:1, name:'CC Care 0,5 Ltr.', subtotal:ccCarePrice}]}); }

  const colorShopping = [];
  for (const fam of Object.keys(familyAgg)) {
    const count = familyAgg[fam];
    const cp = PRODUCT_DB.color[fam];
    if (count>0 && cp) { const tt = count*(useEur?cp.pe:cp.price); total+=tt; colorShopping.push({count, name:cp.name, total:tt}); }
  }
  return { area, needs, shopping, colorShopping, total };
}

    var ccFlowKg = area * mm * 1.8, ccPrimerL = area * 0.1, pureKg = 0;
    if (fcState.pure === 'with') { ccPrimerL = area * 0.12 + area * 0.1; pureKg = area * 0.5; }
    var family = fcState.color && fcState.pure === 'with' ? fcGetColorFamily(fcState.color) : null;
    var colorAddon = family ? fcGetColorAddonCount(pureKg) : 0;
    var universalL = 0, sealerBaseKg = 0, sealerTopKg = 0;
    if (fcState.sealer === 'sealer1') universalL = area * 0.10;
    else if (fcState.sealer === 'sealer2') { universalL = area * 0.10; sealerTopKg = area * 0.20; }

    if (pureKg > 0) needs.push({ label:'PURE', value: pureKg.toFixed(1) + ' kg' });
    if (sealerBaseKg > 0) needs.push({ label:'CC Sealer WP Base', value: fcFormatKilo(sealerBaseKg*1000) + ' kg' });
    if (sealerTopKg > 0) needs.push({ label:'CC Sealer PU Top', value: fcFormatKilo(sealerTopKg*1000) + ' kg' });
    if (universalL > 0) needs.push({ label:'Universal Sealer', value: universalL.toFixed(1) + ' L' });
    if (colorAddon > 0) needs.push({ label:'COLOR (100 g)', value: colorAddon + ' ' + (fcLang==='de'?'Stk.':fcLang==='en'?'pcs.':'stk.') });
    var totalPrice = 0, shopping = [];
    var ccFlowCount = Math.ceil(ccFlowKg / FC_CC_FLOW_KG_PER_UNIT), ccFlowSub = ccFlowCount * FC_CC_FLOW_PRICE_PER_UNIT;
    totalPrice += ccFlowSub;
    shopping.push({ title:'CC FLOW', lines:[{count:ccFlowCount,name:'CC Flow - 20 kg',subtotal:ccFlowSub}] });
    if (ccPrimerL > 0) { var c1 = fcGetCheapestCombination(ccPrimerL, FC_PRODUCT_DB.primer); totalPrice += c1.totalPrice; shopping.push({ title:'CC PRIMER', lines:c1.lines }); }
    if (pureKg > 0) { var tone = fcState.color ? fcGetBaseTone(fcState.color) : 'Alba'; var prods = FC_PRODUCT_DB.pure[tone] || FC_PRODUCT_DB.pure.Alba; var c2 = fcGetCheapestCombination(pureKg, prods); totalPrice += c2.totalPrice; shopping.push({ title:'PURE', lines:c2.lines }); }
    if (sealerBaseKg > 0) { var c3 = fcGetCheapestCombination(sealerBaseKg, FC_PRODUCT_DB.sealerBase); totalPrice += c3.totalPrice; shopping.push({ title:'CC SEALER WP BASE', lines:c3.lines }); }
    if (sealerTopKg > 0) { var c4 = fcGetCheapestCombination(sealerTopKg, FC_PRODUCT_DB.sealerTop); totalPrice += c4.totalPrice; shopping.push({ title:'CC SEALER PU TOP', lines:c4.lines }); }
    if (universalL > 0) { var c5 = fcGetCheapestCombination(universalL, FC_PRODUCT_DB.universal); totalPrice += c5.totalPrice; shopping.push({ title:'UNIVERSAL SEALER', lines:c5.lines }); }
    if (colorAddon > 0 && family && FC_PRODUCT_DB.color[family]) { var cp = FC_PRODUCT_DB.color[family]; var sub = colorAddon * cp.price; totalPrice += sub; shopping.push({ title:'COLOR', lines:[{count:colorAddon,name:cp.name,subtotal:sub}] }); }
    return { area: area, needs: needs, shopping: shopping, totalPrice: totalPrice };

  function fcBuildShoppingListText(){
    var r = fcCalculate();

    var I = (typeof I18N !== 'undefined') ? (I18N[fcLang] || I18N.da) : null;
    if (!I) return '';
    var lines = [];
    lines.push(I.dealerMsgIntro);
    lines.push('');
    lines.push('• ' + I.dealerMsgArea + ': ' + r.area + ' m²');
    lines.push('• CC FLOW');
    if (fcState.pure === 'with') lines.push('• PURE: ' + (fcState.color || 'Alba'));
    var sealerLbl = fcState.sealer === 'sealer1' ? 'Universal Sealer' : fcState.sealer === 'sealer2' ? 'Universal Sealer + PU Top' : '–';
    lines.push('• ' + I.dealerMsgSealer + ': ' + sealerLbl);
    lines.push('');
    lines.push(I.dealerMsgList + ':');
    r.shopping.forEach(function(s){ s.lines.forEach(function(ln){ lines.push('- ' + ln.count + 'x ' + ln.name + ' (' + fcFormatPrice(ln.subtotal) + ')'); }); });
    lines.push('');
    lines.push(I.dealerMsgTotal + ': ' + fcFormatPrice(r.totalPrice));
    return lines.join('\n');

  function fcLoadSavedProjects(){
    try {
      var raw = localStorage.getItem(FC_STORAGE_KEY);
      savedFlowProjects = raw ? JSON.parse(raw) : [];
    } catch(e){ savedFlowProjects = []; }
  }
  fcLoadSavedProjects();

  function fcPersistSavedProjects(){
    try { localStorage.setItem(FC_STORAGE_KEY, JSON.stringify(savedFlowProjects)); } catch(e){}
  }

  function fcSnapshotState(){
    return {
      area: fcState.area, mm: fcState.mm, pure: fcState.pure,
      color: fcState.color, sealer: fcState.sealer
    };
  }

  function fcRestoreState(snap){
    fcState.area = snap.area || '';
    fcState.mm = snap.mm || '2';
    fcState.pure = snap.pure || null;
    fcState.color = snap.color || null;
    fcState.sealer = snap.sealer || '';
    // Determine which step to show: result if all fields filled, otherwise area
    var allFilled = fcState.area && fcState.mm && fcState.pure && fcState.sealer && (fcState.pure !== 'with' || fcState.color);
    fcStep = allFilled ? 'result' : 'area';
    fcHistory = [fcStep];
  }

  function fcSaveProject(name){
    if (!name || !name.trim()) return;
    var id = 'fp_' + Date.now();
    savedFlowProjects.push({
      id: id, name: name.trim(),
      createdAt: new Date().toISOString(),
      state: fcSnapshotState()
    });
    fcPersistSavedProjects();
    activeFlowProjectId = id;
    showFlowSaveDialog = false;
    flowSaveDialogName = '';
    fcRenderSaveDialog();
    fcRenderSavedProjects();
    fcRender();
    if (typeof render === 'function') render();
  }

  function fcLoadProject(id){
    var proj = savedFlowProjects.find(function(p){ return p.id === id; });
    if (!proj) return;
    activeFlowProjectId = id;
    fcRestoreState(proj.state);
    fcRenderSavedProjects();
    fcRender();
    if (typeof render === 'function') render();
  }

  function fcDeleteProject(id, e){
    if (e) { e.stopPropagation(); e.preventDefault(); }
    var proj = savedFlowProjects.find(function(p){ return p.id === id; });
    if (!proj) return;
    var g = (typeof GUIDE_TEXT !== 'undefined') ? (GUIDE_TEXT[fcLang] || GUIDE_TEXT.da) : null;
    if (!confirm((g ? g.deleteConfirm : 'Delete project') + ' "' + proj.name + '"?')) return;
    savedFlowProjects = savedFlowProjects.filter(function(p){ return p.id !== id; });
    fcPersistSavedProjects();
    if (activeFlowProjectId === id) {
      activeFlowProjectId = null;
      fcRestoreState({ area:'', mm:'2', pure:null, color:null, sealer:'' });
    }
    fcRenderSavedProjects();
    fcRender();
    if (typeof render === 'function') render();
  }

  function fcNewProject(){
    activeFlowProjectId = null;
    fcRestoreState({ area:'', mm:'2', pure:null, color:null, sealer:'' });
    fcRenderSavedProjects();
    fcRender();
    if (typeof render === 'function') render();
  }

  function fcDoRestart(){
    activeFlowProjectId = null;
    fcRestoreState({ area:'', mm:'2', pure:null, color:null, sealer:'' });
    fcUi.showDealer = false;
    fcUi.showGuide = false;
    fcUi.dealerQuery = '';
    fcUi.dealerResults = null;
    fcUi.dealerError = false;

    flowRestartAfterSave = false;

  function fcConfirmSaveProject(){
    var inp = document.getElementById('fcSaveNameInput');
    var name = (inp ? inp.value : flowSaveDialogName) || flowSaveDialogName;
    if (!name || !name.trim()) return;
    if (activeFlowProjectId){

        proj.name = name.trim();
        proj.state = fcSnapshotState();
        fcPersistSavedProjects();
        showFlowSaveDialog = false;

        fcRenderSavedProjects();

    fcRenderSavedProjects();

  };
})();

    { q:'Kan man få betonlook på badeværelse med microcement?', a:'Ja, microcement er velegnet til at skabe et flot betonlook på badeværelser, når det udføres efter vores vejledninger, afsluttes med korrekt forsegling, og underlaget indeholder en godkendt vådrumsmembran.', c:'badevaerelse' },
    { q:'Kan man selv påføre microcement på badeværelse?', a:'Ja, man kan selv påføre microcement på et badeværelse, når det udføres efter vores vejledninger, afsluttes med korrekt forsegling, og underlaget indeholder en godkendt vådrumsmembran. Du kan beregne dit projekt og få en skræddersyet vejledning til netop dit badeværelse.', c:'badevaerelse' },
    { q:'Kan man anvende microcement på bordplader?', a:'Ja, microcement kan anvendes på bordplader, når overfladen forsegles korrekt.', c:'bordplader' },
    { q:'Kan man opnå betonlook på en bordplade med microcement?', a:'Ja, microcement er velegnet til at skabe betonlook på bordplader.', c:'bordplader' },
    { q:'Kan microcement anvendes ovenpå en eksisterende bordplade?', a:'Ja, microcement kan påføres ovenpå en eksisterende bordplade, så man kan forny overfladen uden at udskifte hele bordpladen.', c:'bordplader' },
    { q:'Kan microcement påføres ovenpå en køkkenbordplade?', a:'Ja, microcement kan påføres ovenpå køkkenbordplader, når overfladen forsegles korrekt.', c:'bordplader' },
    { q:'Kan en microcement bordplade tåle vand?', a:'Ja, en microcement bordplade kan tåle vand, når overfladen er korrekt forseglet med den rette sealer.', c:'bordplader' },
    { q:'Hvor holdbar er en microcement bordplade?', a:'En microcement bordplade er stærk og holdbar ved almindelig daglig brug, når den er påført og forseglet korrekt.', c:'bordplader' },
    { q:'Hvor meget koster en microcement bordplade?', a:'Prisen afhænger af bordpladens størrelse og projektets opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'bordplader' },
    { q:'Kan man selv påføre microcement på en bordplade?', a:'Ja, man kan selv påføre microcement på en bordplade. Du kan beregne dit projekt og få en skræddersyet vejledning til netop dit projekt.', c:'bordplader' },
    { q:'Skal en microcement bordplade forsegles?', a:'Ja, en microcement bordplade bør forsegles, så overfladen beskyttes mod vand, snavs og daglig brug.', c:'bordplader' },
    { q:'Kan microcement tåle varme gryder eller kolde genstande?', a:'Nej. Vi anbefaler altid at bruge bordskånere til varme gryder og iskolde genstande for at undgå risiko for misfarvninger, kondensmærker eller termiske påvirkninger af overfladen.', c:'bordplader' },
    { q:'Kan man anvende microcement udendørs?', a:'Ja, vores microcement kan bruges udendørs, forudsat at underlaget er velegnet. Bemærk, at mange traditionelle microcementprodukter ikke egner sig til udendørs anvendelse.', c:'eksterior' },
    { q:'Kan microcement anvendes på udendørs vægge?', a:'Ja, vores microcement kan anvendes på udendørs vægge, forudsat at underlaget er velegnet.', c:'eksterior' },
    { q:'Kan microcement anvendes på facade?', a:'Ja, vores microcement kan anvendes på facader, forudsat at underlaget er velegnet.', c:'eksterior' },
    { q:'Kan microcement anvendes på terrasse?', a:'Ja, microcement kan anvendes på terrasser for at skabe et flot betonlook, forudsat at underlaget er velegnet.', c:'eksterior' },
    { q:'Kan microcement anvendes på beton udendørs?', a:'Ja, beton er et velegnet underlag til microcement udendørs.', c:'eksterior' },
    { q:'Kan man skabe betonlook udendørs med microcement?', a:'Ja, microcement er velegnet til at skabe betonlook på udendørs overflader, forudsat at underlaget er velegnet.', c:'eksterior' },
    { q:'Kan microcement tåle regn?', a:'Ja, Contec Coatings microcement kan tåle regn, når overfladen er udført efter vores vejledninger og korrekt forseglet med Universal Sealer.', c:'eksterior' },
    { q:'Kan microcement tåle frost?', a:'Ja, Contec Coatings microcement kan anvendes udendørs og tåle frost, når overfladen er udført efter vores vejledninger og korrekt forseglet med Universal Sealer.', c:'eksterior' },
    { q:'Kan microcement tåle sol og skiftende vejr?', a:'Ja, microcement kan bruges udendørs og modstå sol, regn og skiftende vejrforhold, når overfladen er udført efter vores vejledninger og korrekt forseglet med Universal Sealer.', c:'eksterior' },
    { q:'Hvor meget koster microcement udendørs?', a:'Prisen afhænger af projektets størrelse, underlag og opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'eksterior' },
    { q:'Skal microcement udendørs forsegles?', a:'Ja, vores microcement til udendørs brug skal altid beskyttes med Universal Sealer.', c:'eksterior' },
    { q:'Kan man selv påføre microcement udendørs?', a:'Ja, man kan selv påføre microcement udendørs. Du kan beregne dit projekt og få en skræddersyet vejledning til netop dit projekt.', c:'eksterior' },
    { q:'Kan microcement anvendes til industrigulve?', a:'Ja, vores microcement er velegnet til industrigulve, da den er baseret på højstyrkebeton, som giver en ekstremt stærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement anvendes i lagerhaller?', a:'Ja, vores microcement er velegnet til lagerhaller, da den er baseret på højstyrkebeton, som giver en ekstremt stærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement anvendes i værksteder?', a:'Ja, vores microcement er velegnet til værksteder, da den er baseret på højstyrkebeton, som giver en ekstremt stærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement anvendes i produktionslokaler?', a:'Ja, vores microcement er velegnet til produktionslokaler, da den er baseret på højstyrkebeton, som giver en ekstremt stærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement anvendes til hoteller?', a:'Ja, vores microcement er baseret på højstyrkebeton, hvilket giver en ekstremt stærk overflade. Derfor er den velegnet til hoteller, hvor gulve, vægge og badeværelser skal kunne modstå daglig brug. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement anvendes i butikker og erhverv?', a:'Ja, vores microcement er velegnet til butikker og erhverv, da den er baseret på højstyrkebeton, som giver en ekstremt stærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Hvad er forskellen på microcement og epoxy til industrigulve?', a:'Microcement er cementbaseret og giver et naturligt og autentisk betonlook. Epoxy er plastbaseret og giver et mere kunstigt udtryk, men har til gengæld en højere kemikalieresistens.', c:'industri' },
    { q:'Hvad er forskellen på microcement og polyurethan til industrigulve?', a:'Microcement er cementbaseret og hårdt, hvilket giver et naturligt og autentisk betonlook. Polyurethan er plastbaseret og mere elastisk, hvilket giver et mere kunstigt udtryk.', c:'industri' },
    { q:'Hvor slidstærkt er microcement til industri?', a:'Vores microcement er baseret på højstyrkebeton og er udviklet til at give en ekstremt stærk og slidstærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement tåle høj belastning?', a:'Ja, vores microcement kan tåle høj belastning, da den er baseret på højstyrkebeton. Det giver en ekstremt stærk og slidstærk overflade. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Kan microcement bruges på betongulv i industri?', a:'Ja, betongulve er et velegnet underlag til microcement i industri- og erhvervsbyggeri.', c:'industri' },
    { q:'Kan man renovere et industrigulv med microcement?', a:'Ja, microcement kan anvendes til at renovere eksisterende industrigulve uden at udskifte hele gulvet. Bemærk, at mange traditionelle microcementprodukter kun er velegnede til boligformål.', c:'industri' },
    { q:'Hvor meget koster microcement til industrigulve?', a:'Prisen afhænger af areal, underlag, belastning og valg af opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'industri' },
    { q:'Kan man anvende microcement på møbler?', a:'Ja, microcement kan anvendes til at give møbler en ny overflade med et flot betonlook.', c:'moebler' },
    { q:'Kan man udføre betonlook på møbler med microcement?', a:'Ja, microcement er velegnet til at skabe betonlook på møbler.', c:'moebler' },
    { q:'Kan microcement anvendes på et sofabord?', a:'Ja, microcement kan påføres sofaborde og give dem et råt og moderne betonlook.', c:'moebler' },
    { q:'Kan microcement anvendes på skabe og låger?', a:'Ja, microcement kan påføres skabe og låger, så de får en ny overflade med betonlook.', c:'moebler' },
    { q:'Kan man forny gamle møbler med microcement?', a:'Ja, microcement kan anvendes til at forny gamle møbler uden at udskifte dem.', c:'moebler' },
    { q:'Kan microcement på møbler tåle vand?', a:'Ja, microcement på møbler kan tåle vand, når overfladen er korrekt forseglet.', c:'moebler' },
    { q:'Kan microcement på møbler tåle daglig brug?', a:'Ja, microcement kan tåle daglig brug, når det påføres og forsegles efter vores vejledninger.', c:'moebler' },
    { q:'Hvor holdbart er microcement på møbler?', a:'Microcement er en stærk og slidstærk overflade til møbler og egner sig godt til almindelig daglig brug i hjemmet.', c:'moebler' },
    { q:'Hvor meget koster microcement til møbler?', a:'Prisen afhænger af møblets størrelse og projektets opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'moebler' },
    { q:'Kan man selv påføre microcement på møbler?', a:'Ja, man kan selv påføre microcement på møbler. Du kan beregne dit projekt og få en skræddersyet vejledning til netop dit projekt.', c:'moebler' },
    { q:'Kan man anvende microcement på trapper?', a:'Ja, microcement kan bruges på trapper, både indendørs og udendørs.', c:'trapper' },
    { q:'Kan man udføre betonlook på trapper med microcement?', a:'Ja, microcement er velegnet til at skabe betonlook på trapper.', c:'trapper' },
    { q:'Kan microcement anvendes på en betontrappe?', a:'Ja, beton er et velegnet underlag til microcement på trapper.', c:'trapper' },
    { q:'Kan microcement anvendes på udendørs trapper?', a:'Ja, vores microcement kan anvendes på udendørs trapper, når underlaget er velegnet, og overfladen udføres efter vores vejledninger.', c:'trapper' },
    { q:'Kan microcement på trapper tåle slid?', a:'Ja, microcement på trapper kan tåle dagligt slid, når overfladen er korrekt forseglet.', c:'trapper' },
    { q:'Kan microcement på trapper tåle vand?', a:'Ja, microcement på trapper kan tåle vand, når overfladen er korrekt forseglet.', c:'trapper' },
    { q:'Hvor holdbar er microcement på trapper?', a:'Microcement er en stærk og slidstærk overflade til trapper, der egner sig godt til almindelig daglig brug.', c:'trapper' },
    { q:'Hvor meget koster microcement på trapper?', a:'Prisen afhænger af trappens størrelse og projektets opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'trapper' },
    { q:'Kan man selv påføre microcement på trapper?', a:'Ja, man kan selv påføre microcement på trapper. Du kan beregne dit projekt og få en skræddersyet vejledning til netop dit projekt.', c:'trapper' },
    { q:'Hvad bruges primer til?', a:'Primer sikrer optimal vedhæftning til underlaget, før de efterfølgende lag påføres.', c:'ccPrimer' },
    { q:'Hvornår skal man bruge primer?', a:'Primer påføres før vores PURE microcement, CC Filler spartelmasse og CC Flow flydemørtel samt mellem lagene for at sikre optimal vedhæftning.', c:'ccPrimer' },
    { q:'Skal man altid bruge primer før microcement?', a:'Ja, der skal altid primes før påføring af vores PURE microcement.', c:'ccPrimer' },
    { q:'Skal primer blandes med vand?', a:'Ja. Bland primeren i forholdet 1:1 på ikke-sugende underlag og 1:3 på sugende underlag. Et sugende underlag optager væske, f.eks. beton eller spartelmasse, mens et ikke-sugende underlag næsten ikke optager væske, f.eks. fliser og klinker. Test underlaget med en vanddråbe – perler vandet, er underlaget ikke-sugende, og suges det op, er underlaget sugende.', c:'ccPrimer' },
    { q:'Hvor meget primer skal man bruge pr. m²?', a:'Der skal bruges mindst 100 g primer pr. m².', c:'ccPrimer' },
    { q:'Hvor lang tid skal primer tørre?', a:'Primeren har en tørretid på ca. 1 time, før næste lag kan påføres.', c:'ccPrimer' },
    { q:'Hvor mange lag primer skal der påføres?', a:'Primer påføres i ét tyndt og ensartet lag. Hvis der ikke er udlagt mindst 100 g primer pr. m², bør der påføres et ekstra lag.', c:'ccPrimer' },
    { q:'Hvilken temperatur skal der være?', a:'Temperaturen skal være mindst 10 °C under påføring og tørring.', c:'ccPrimer' },
    { q:'Hvad er forskellen på sugende og ikke-sugende underlag?', a:'Et sugende underlag optager væske, f.eks. beton eller spartelmasse. Et ikke-sugende underlag optager næsten ikke væske, f.eks. fliser og klinker. Test underlaget med en vanddråbe for at se, om vandet suges op eller perler på overfladen.', c:'ccPrimer' },
    { q:'Hvad skal man være opmærksom på ved påføring af CC Primer?', a:'CC Primer skal påføres i et tyndt og ensartet lag. Undgå, at produktet samler sig i pytter eller primersøer, da det kan påvirke vedhæftningen og den efterfølgende opbygning.', c:'ccPrimer' },
    { q:'Skal CC Primer kun bruges én gang i processen?', a:'Nej. CC Primer bruges ikke kun i starten. Den skal også anvendes før og mellem lagene ved påføring af PURE microcement, CC Filler og CC Flow.', c:'ccPrimer' },
    { q:'Skal underlaget være rent før primer?', a:'Ja. Underlaget skal være fast, rent og fri for støv, snavs og løse partikler, før primeren påføres. Det sikrer den bedst mulige vedhæftning.', c:'ccPrimer' },
    { q:'Kan man udelade at bruge primer?', a:'Nej. CC Primer er nødvendig for at sikre, at det næste lag hæfter korrekt til underlaget. Det gælder både før PURE microcement, CC Filler og CC Flow.', c:'ccPrimer' },
    { q:'Skal man bruge primer på fliser før microcement?', a:'Ja. Fliser er typisk et ikke-sugende underlag og skal derfor primes, før der påføres microcement. CC Primer sikrer optimal vedhæftning.', c:'ccPrimer' },
    { q:'Skal man bruge primer på beton før microcement?', a:'Ja. Beton er typisk et sugende underlag og skal derfor primes, før der påføres microcement. CC Primer sikrer optimal vedhæftning til betonen.', c:'ccPrimer' },
    { q:'Skal man bruge primer på spartelmasse før microcement?', a:'Ja. Spartelmasse er typisk et sugende underlag og skal derfor primes, før der påføres microcement. CC Primer sikrer optimal vedhæftning til spartelmassen.', c:'ccPrimer' },
    { q:'Kan man påføre CC Primer med andre redskaber end malerrulle?', a:'Ja. Malerrulle anbefales til de fleste projekter, da den gør det nemt at påføre primeren i et tyndt og ensartet lag. På nogle underlag kan primeren også påføres med sprøjte, vandkande, kost eller børste, så længe den fordeles jævnt og ikke samler sig i pytter eller primersøer.', c:'ccPrimer' },
    { q:'Hvad er CC Filler?', a:'CC Filler er en spartelmasse, der bruges til at udjævne underlaget før påføring af microcement.', c:'ccFiller' },
    { q:'Hvornår skal spartelmassen anvendes?', a:'Spartelmasse anvendes, når underlaget er ujævnt og skal gøres plant før påføring af microcement. CC Filler er Contec Coatings spartelmasse til udjævning af underlaget.', c:'ccFiller' },
    { q:'Kan spartelmassen bruges på fliser og klinker?', a:'Ja. CC Filler kan bruges på fliser og klinker, når overfladen først klargøres og derefter primes. Den anvendes til at udjævne fliser, klinker og fuger før påføring af microcement.', c:'ccFiller' },
    { q:'Skal der primes mellem lagene?', a:'Ja. Der skal primes før hvert lag for at sikre optimal vedhæftning.', c:'ccFiller' },
    { q:'Hvordan påføres spartelmasse?', a:'CC Filler påføres med en spartel i et jævnt og ensartet lag.', c:'ccFiller' },
    { q:'Hvor meget vand skal der tilsættes spartelmassen?', a:'Bland 350–400 g koldt vand pr. 1.000 g CC Filler.', c:'ccFiller' },
    { q:'Hvor mange lag spartelmasse skal påføres?', a:'Som udgangspunkt påføres to jævne lag CC Filler.', c:'ccFiller' },
    { q:'Hvor lang tid skal spartelmassen tørre?', a:'Tørretiden for CC Filler er 1–3 timer pr. lag, afhængigt af temperatur og luftfugtighed.', c:'ccFiller' },
    { q:'Hvor lang tid kan spartelmassen arbejdes med?', a:'CC Filler har en brugstid på ca. 30–40 minutter efter blanding. Bland derfor kun den mængde, der skal bruges til det aktuelle lag.', c:'ccFiller' },
    { q:'Kan man få terrazzolook med Flakes?', a:'Ja. Vores Flakes er små flager, der blandes i CC Filler. Når overfladen efterfølgende slibes, blotlægges flagerne, så der opnås et flot terrazzolook.', c:'ccFillerFlakes' },
    { q:'Hvordan laver man terrazzolook?', a:'Terrazzolook laves ved at blande Flakes i spartelmassen CC Filler. Massen påføres med spartel og slibes, når den er tør, så flagerne bliver synlige.', c:'ccFillerFlakes' },
    { q:'Kan man få terrazzolook på badeværelset?', a:'Ja. Terrazzolook kan udføres på badeværelser, når opbygningen udføres efter vores vejledninger.', c:'ccFillerFlakes' },
    { q:'Kan man få terrazzolook på vægge?', a:'Ja. Med Flakes kan du skabe terrazzolook på vægge og stort set alle andre faste overflader.', c:'ccFillerFlakes' },
    { q:'Kan man få terrazzolook på gulve?', a:'Ja. Med Flakes kan du skabe terrazzolook på gulve og stort set alle andre faste overflader.', c:'ccFillerFlakes' },
    { q:'Kan man udføre terrazzolook ovenpå fliser?', a:'Ja. Med Flakes kan du skabe terrazzolook ovenpå fliser og stort set alle andre faste overflader, når underlaget klargøres korrekt.', c:'ccFillerFlakes' },
    { q:'Hvordan iblandes Flakes?', a:'Flakes tilsættes CC Filler og blandes forsigtigt og jævnt, inden spartelmassen påføres.', c:'ccFillerFlakes' },
    { q:'Hvor meget Flakes skal der tilsættes for at opnå terrazzolook?', a:'Der tilsættes 10 % Flakes i forhold til mængden af CC Filler.', c:'ccFillerFlakes' },
    { q:'Hvor lang tid skal spartelmassen med Flakes tørre?', a:'Tørretiden er 1–3 timer pr. lag, afhængigt af temperatur og luftfugtighed.', c:'ccFillerFlakes' },
    { q:'Hvilke overflader kan man skabe terrazzolook på?', a:'Terrazzolook kan skabes på gulve, vægge, bordplader, fliser og klinker. Hos Contec Coating opnås terrazzolook ved at blande Flakes i CC Filler.', c:'ccFillerFlakes' },
    { q:'Hvor meget koster terrazzolook?', a:'Prisen afhænger af projektets størrelse og opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'ccFillerFlakes' },
    { q:'Kan man udføre terrazzolook i farvet beton?', a:'Ja. Der kan både tilsættes Color-farvepigment og Flakes i den samme blanding, så du opnår et farvet terrazzolook.', c:'ccFillerFlakes' },
    { q:'Hvad er flydespartel?', a:'Vores flydespartel, CC Flow, er en selvnivellerende spartelmasse, der bruges til at udjævne og plane gulve.', c:'ccFlow' },
    { q:'Hvornår skal man bruge flydespartel?', a:'Flydespartel bruges, når ujævne gulve skal udjævnes, så der skabes et plant og vandret underlag. CC Flow kan påføres i lag på op til 10 mm pr. lag.', c:'ccFlow' },
    { q:'Hvad betyder det, at flydespartel er selvnivellerende?', a:'Selvnivellerende betyder, at massen flyder ud af sig selv og fordeler sig jævnt over underlaget. For at opnå en helt plan overflade anbefales det dog at bearbejde massen med en pigrulle, som samtidig fjerner luftbobler.', c:'ccFlow' },
    { q:'Hvordan blandes flydespartel?', a:'CC Flow blandes med en dissolver (piskeris) i en spand i minimum 3 minutter, indtil massen er jævn og klumpfri.', c:'ccFlow' },
    { q:'Hvordan påføres flydespartel?', a:'Hæld massen ud på gulvet og fordel den groft med en rive, tandspartel eller lignende. Udlæg flere blandinger hurtigt efter hinanden, så de flyder sammen vådt-i-vådt. Afslut med en pigrulle for at udjævne overfladen og fjerne luftbobler.', c:'ccFlow' },
    { q:'Hvor tykt et lag flydespartel kan man lægge?', a:'CC Flow kan påføres i lag på op til 10 mm pr. lag.', c:'ccFlow' },
    { q:'Hvor lang tid skal CC Flow tørre?', a:'Tørretiden er ca. 8 timer, før næste arbejdstrin kan udføres.', c:'ccFlow' },
    { q:'Hvor lang tid kan CC Flow arbejdes med?', a:'Brugstiden er ca. 20–30 minutter efter blanding.', c:'ccFlow' },
    { q:'Hvor meget koster flydespartel?', a:'Prisen afhænger af projektets størrelse og lagtykkelse. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'ccFlow' },
    { q:'Hvad betyder "selvnivellerende"?', a:'Det betyder, at massen er så tyndtflydende, at den næsten planer sig selv ved hjælp af tyngdekraften. For at opnå et optimalt resultat anbefales det dog at anvende en pigrulle.', c:'ccFlow' },
    { q:'Kan man lægge flere lag flydespartel oven på hinanden?', a:'Ja. Det første lag skal være helt tørt, og underlaget skal primes igen, før næste lag påføres. CC Flow kan påføres i lag på op til 10 mm pr. lag.', c:'ccFlow' },
    { q:'Hvor meget flydespartel skal jeg bruge pr. kvadratmeter gulv?', a:'Forbruget af CC Flow er ca. 1,8 kg pr. m² pr. mm lagtykkelse.', c:'ccFlow' },
    { q:'Hvad er forskellen på flydebeton, flydemørtel og flydespartel?', a:'Begreberne bruges ofte om hinanden, men der er forskel. Flydebeton er den groveste type og indeholder grus eller skærver, hvilket gør den velegnet til lagtykkelser på op til ca. 100 mm. Flydespartel har de fineste partikler og anvendes typisk i lag på op til ca. 10 mm. Flydemørtel ligger mellem de to og kan anvendes i mellemstore lagtykkelser.', c:'ccFlow' },
    { q:'Kan man selv påføre microcement?', a:'Ja, mange kan selv påføre microcement. Vi anbefaler, at du følger vores skræddersyede vejledninger trin for trin for at opnå det bedste resultat.', c:'pure' },
    { q:'Hvor mange lag microcement skal der påføres?', a:'Der skal påføres mindst to lag microcement.', c:'pure' },
    { q:'Skal microcement forsegles?', a:'Ja, microcement skal altid forsegles for at beskytte overfladen mod vand, snavs og slid.', c:'pure' },
    { q:'Er PURE Contec Coatings microcement?', a:'Ja, PURE er Contec Coatings microcementprodukt.', c:'pure' },
    { q:'Hvordan påføres microcement?', a:'PURE påføres i tynde lag. Mellem lagene slibes overfladen let og primes igen, inden næste lag påføres. Contec Coatings PURE kan påføres med malerrulle, hvilket gør processen enklere end traditionel microcement, som normalt påføres med spartel.', c:'pure' },
    { q:'Hvilke redskaber skal man bruge til at påføre microcement?', a:'Første lag PURE påføres altid med malerrulle. Andet lag kan påføres med malerrulle, spartel eller svamp, afhængigt af det ønskede udtryk.', c:'pure' },
    { q:'Hvor lang tid skal microcement tørre?', a:'Tørretiden er typisk 1–3 timer pr. lag, afhængigt af temperatur og luftfugtighed.', c:'pure' },
    { q:'Skal microcement slibes mellem lagene?', a:'Ja, PURE slibes let mellem lagene for at fjerne små ujævnheder og sikre en ensartet overflade.', c:'pure' },
    { q:'Hvor meget vand skal der tilsættes microcement?', a:'Til PURE tilsættes 330–420 g koldt vand pr. 1.000 g produkt. Dette gælder ikke nødvendigvis for andre microcementprodukter.', c:'pure' },
    { q:'Hvor lang tid kan microcement bruges efter blanding?', a:'PURE har en brugstid på ca. 4–8 timer efter blanding. Dette gælder ikke nødvendigvis for andre microcementprodukter.', c:'pure' },
    { q:'Hvor meget koster microcement?', a:'Prisen afhænger af projektets størrelse og opbygning. Du kan beregne dit projekt og få en samlet pris samt en tilhørende vejledning.', c:'pure' },
    { q:'Hvordan skal microcement slibes?', a:'PURE slibes let med sandpapir, typisk korn 40–120. Valget af kornstørrelse afhænger af overfladen og det ønskede resultat.', c:'pure' },
    { q:'Kan man ændre finishen på microcement?', a:'Ja. Finishen kan ændres ved påføringen af andet lag PURE. Malerrulle giver et mere ensartet udtryk, mens spartel eller svamp skaber mere struktur og variation.', c:'pure' },
    { q:'Hvordan er overfladen på microcement?', a:'Microcement er den løsning, der kommer tættest på et ægte støbt betongulv. Overfladen har et naturligt farvespil og føles samt opfører sig mere som beton end plast eller maling.', c:'pure' },
    { q:'Hvordan vedligeholdes microcement?', a:'Vedligeholdelsen afhænger af den sealer, der beskytter overfladen. Der bør altid anvendes et pH-neutralt rengøringsmiddel, og sand og grus bør støvsuges eller fejes væk for at undgå ridser.', c:'pure' },
    { q:'Hvilke krav er der til underlaget for microcement?', a:'Underlaget skal være stabilt, fast, plant, tørt, revnefrit og fri for støv, fedt, olie og løstsiddende maling. Før påføring af microcement skal underlaget primes for at sikre optimal vedhæftning.', c:'pure' },
    { q:'Kan man farve microcement?', a:'Ja, microcement kan farves med vores farvepigment Color, som blandes sammen med PURE.', c:'color' },
    { q:'Hvilke farver kan man få microcement i?', a:'Microcement fås i en række forskellige farver. Du kan se hele farveudvalget i vores farvekatalog eller visualisere farverne direkte i din egen bolig med vores visualiseringsværktøj.', c:'color' },
    { q:'Kan man selv blande farve i microcement?', a:'Ja, man kan selv blande farve i microcement, så længe vores vejledning følges.', c:'color' },
    { q:'Skal Color blandes direkte ned i microcementen?', a:'Nej. Color skal ikke tilsættes direkte i PURE. Ryst først den tørre pulverfarve grundigt, bland den derefter op med en mindre del af vandet, og tilsæt til sidst det indfarvede vand til microcementen.', c:'color' },
    { q:'Skal man ryste Color inden brug?', a:'Ja. Den tørre pulverfarve bør rystes grundigt inden brug for at undgå klumper.', c:'color' },
    { q:'Skal man teste farven, før man påfører microcement?', a:'Ja. Vi anbefaler altid at teste farven på et mindre område først, så du er sikker på, at resultatet bliver, som du ønsker.', c:'color' },
    { q:'Påvirker Color tørretid og brugstid?', a:'Nej. Color påvirker hverken tørretiden eller brugstiden for PURE.', c:'color' },
    { q:'Hvor meget Color er der i farverne fra farvekataloget?', a:'Alle farver i vores farvekatalog er baseret på 2 % Color i PURE, svarende til 20 g Color pr. 1.000 g PURE. Du kan dog tilsætte op til 6 % Color, hvis du ønsker en kraftigere farve.', c:'color' },
    { q:'Hvor meget farve må man maksimalt tilsætte microcement?', a:'Der må maksimalt tilsættes 6 % Color til PURE, svarende til 60 g Color pr. 1.000 g PURE.', c:'color' },
    { q:'Kan man se billeder af de forskellige farver til inspiration?', a:'Ja. Du kan finde inspiration på vores inspirationsside, men den bedste måde at vælge farve på er at bruge vores visualiseringsværktøj, hvor du kan se farverne direkte i din egen bolig.', c:'color' },
    { q:'Skal microcement forsegles?', a:'Ja, microcement skal altid forsegles for at beskytte overfladen mod vand, snavs og slid.', c:'universalSealer' },
    { q:'Hvilken sealer skal man bruge til microcement?', a:'Det afhænger af projektet. Universal Sealer er en åndbar sealer, der egner sig til f.eks. udendørs brug, kældervægge og andre overflader, hvor materialet skal kunne ånde. I vådrum og andre områder med høj vandbelastning skal der anvendes en tættere opbygning med WP Base og PU Top.', c:'universalSealer' },
    { q:'Hvad bruges sealer til på microcement?', a:'Sealer beskytter microcementen og gør overfladen mere modstandsdygtig over for vand, snavs og slid.', c:'universalSealer' },
    { q:'Hvad bruges Universal Sealer til?', a:'Universal Sealer bruges som en åndbar forsegling af microcement på overflader, hvor fugt skal kunne passere gennem konstruktionen.', c:'universalSealer' },
    { q:'Skal Universal Sealer blandes op med vand?', a:'Nej. Universal Sealer er klar til brug og skal ikke blandes med vand.', c:'universalSealer' },
    { q:'Hvordan påføres Universal Sealer?', a:'Universal Sealer påføres i et tyndt og jævnt lag med en kortluvet malerrulle eller lakrulle.', c:'universalSealer' },
    { q:'Hvor mange lag Universal Sealer skal der påføres?', a:'Vi anbefaler to lag Universal Sealer.', c:'universalSealer' },
    { q:'Hvor meget Universal Sealer skal man bruge pr. m²?', a:'Vi anbefaler et forbrug på 100 g Universal Sealer pr. m² pr. lag.', c:'universalSealer' },
    { q:'Hvor lang tid skal Universal Sealer tørre?', a:'Tørretiden er typisk 1–3 timer pr. lag, afhængigt af temperatur og luftfugtighed.', c:'universalSealer' },
    { q:'Kan Universal Sealer bruges alene i vådrum?', a:'Nej. Universal Sealer er en åndbar sealer og må aldrig anvendes alene i vådrum. I vådrum skal der anvendes en tæt forsegling med WP Base og PU Top.', c:'universalSealer' },
    { q:'Kan man gøre microcement vandafvisende med sealer?', a:'Ja. Med den rette sealeropbygning kan microcement gøres vandafvisende. I vådrum anvendes WP Base efterfulgt af PU Top. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'wpBase' },
    { q:'Hvordan forsegler man microcement i vådrum?', a:'I vådrum forsegles microcement med to lag WP Base og afsluttes med to lag PU Top. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'wpBase' },
    { q:'Hvad er forskellen på åndbar sealer og vandtæt vådrumssealer?', a:'En åndbar sealer lader overfladen ånde og anvendes f.eks. udendørs, i kældre og på vægge. En vådrumssealer lukker overfladen helt og gør den vandtæt, hvilket er nødvendigt i vådrum.', c:'wpBase' },
    { q:'Hvor mange lag sealer skal microcement have i vådrum?', a:'I vådrum påføres to lag WP Base efterfulgt af to lag PU Top.', c:'wpBase' },
    { q:'Kan microcement tåle vand i badeværelse?', a:'Ja. Microcement kan anvendes i badeværelser, når overfladen først forsegles med WP Base og derefter med PU Top. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'wpBase' },
    { q:'Hvad er forskellen på sealer og topcoat til microcement?', a:'Sealeren beskytter og lukker overfladen, mens topcoaten er det afsluttende lag, som giver den endelige beskyttelse og finish.', c:'wpBase' },
    { q:'Hvad er WP Base?', a:'WP Base er en sealer til microcement, der anvendes i vådrum og andre områder med høj vandbelastning.', c:'wpBase' },
    { q:'Hvornår skal man bruge WP Base?', a:'WP Base anvendes, når microcement skal forsegles i badeværelser, vådrum og andre steder, hvor overfladen skal være vandtæt. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'wpBase' },
    { q:'Kan WP Base bruges i vådrum?', a:'Ja. WP Base anvendes i vådrum som base under PU Top. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'wpBase' },
    { q:'Hvordan blandes WP Base?', a:'WP Base blandes i forholdet 1:1 mellem komponent A og B. Bland grundigt uden at piske luft ind i blandingen.', c:'wpBase' },
    { q:'Må WP Base fortyndes med vand?', a:'Nej. WP Base må ikke fortyndes med vand.', c:'wpBase' },
    { q:'Hvordan påføres WP Base?', a:'WP Base påføres i meget tynde og jævne lag med en kortluvet malerrulle eller lakrulle.', c:'wpBase' },
    { q:'Hvor mange lag WP Base skal der påføres?', a:'Der skal påføres to lag WP Base.', c:'wpBase' },
    { q:'Hvor meget WP Base skal man bruge pr. m²?', a:'Beregn et forbrug på ca. 100 g WP Base pr. m² pr. lag.', c:'wpBase' },
    { q:'Hvor lang tid skal WP Base tørre?', a:'WP Base er tør efter ca. 1 time.', c:'wpBase' },
    { q:'Hvor lang tid kan WP Base arbejdes med efter blanding?', a:'WP Base har en brugstid på ca. 2 timer efter blanding. Derefter begynder produktet at hærde og bør ikke længere anvendes.', c:'wpBase' },
    { q:'Hvad er topcoat til microcement?', a:'Topcoat er den øverste, afsluttende og elastiske forsegling, som beskytter microcementen og den underliggende basisforsegling mod UV-stråling, vand, snavs, ridser og slid.', c:'puTop' },
    { q:'Hvad bruges PU Top til?', a:'PU Top bruges som den afsluttende topcoat på microcement, når overfladen skal have en stærk, slidstærk og vandafvisende beskyttelse.', c:'puTop' },
    { q:'Hvornår skal man bruge PU Top?', a:'PU Top påføres efter WP Base, når der ønskes en tæt, elastisk og stærk forsegling.', c:'puTop' },
    { q:'Skal PU Top bruges efter WP Base?', a:'Ja. PU Top anvendes som den afsluttende topcoat oven på WP Base.', c:'puTop' },
    { q:'Kan PU Top bruges i vådrum?', a:'Ja. PU Top anvendes i vådrum som afsluttende topcoat oven på WP Base. Bemærk, at underlaget altid skal indeholde en godkendt vådrumsmembran.', c:'puTop' },
    { q:'Hvad er blandingsforholdet for PU Top?', a:'PU Top blandes i forholdet 1:1 mellem komponent A og B. Bland kun den mængde, du skal bruge.', c:'puTop' },
    { q:'Må topcoat fortyndes med vand?', a:'Nej. PU Top må ikke fortyndes med vand.', c:'puTop' },
    { q:'Hvor mange lag topcoat skal microcement have?', a:'Vi anbefaler mindst to lag PU Top for at opnå den optimale beskyttelse.', c:'puTop' },
    { q:'Hvor lang tid skal topcoat tørre på microcement?', a:'PU Top er typisk tør efter ca. 20 minutter.', c:'puTop' },
    { q:'Kan microcement tåle vand efter topcoat?', a:'Ja. Når microcement er korrekt forseglet med WP Base og PU Top, kan overfladen modstå vand. I vådrum skal underlaget altid være opbygget med en godkendt vådrumsmembran.', c:'puTop' },
    { q:'Hvordan påføres topcoat?', a:'PU Top påføres i meget tynde og jævne lag med en kortluvet malerrulle eller lakrulle.', c:'puTop' },
    { q:'Hvor mange lag PU Top skal der påføres?', a:'Der skal påføres mindst to lag PU Top.', c:'puTop' },
    { q:'Hvor meget PU Top skal man bruge pr. m²?', a:'Beregn et forbrug på ca. 100 g PU Top pr. m² pr. lag.', c:'puTop' },
    { q:'Hvor lang tid skal PU Top tørre?', a:'PU Top er typisk tør efter ca. 20 minutter.', c:'puTop' },
    { q:'Hvor lang tid kan PU Top arbejdes med efter blanding?', a:'PU Top har en brugstid på ca. 40 minutter efter blanding. Herefter begynder produktet at hærde og bør ikke længere anvendes.', c:'puTop' },
  ],
  en: [
    { q:'What is Contec Coating?', a:'Contec Coating is a high-strength concrete binder that provides a dense and durable surface, for both indoor and outdoor use.' },
    { q:'Where are you located?', a:'We are located at Axel Kiers Vej 30, 8270 Højbjerg - DK.' },
    { q:'How long have you existed?', a:'Our product was previously used for quality assurance of cast surfaces we produced, and has therefore existed since 2008 as an internal quality assurance product.' },
    { q:'What sets you apart from competitors?', a:'We are the simple and fast choice — with our system you can get from A to B faster than with traditional microcement.' },
    { q:'Do you work all over Denmark?', a:'Yes, and also outside the country.' },
    { q:'Do you offer consulting before starting?', a:'Yes, you are welcome to call or write to us at info@conteccoating.dk or +45 86280290.' },
    { q:'Can we visit you or see solutions?', a:'You can book a time in our showroom in Aarhus at Axel Kiers Vej 30, 8270 Højbjerg - DK. Write to info@conteccoating.dk or call +45 86280290.' },
    { q:'Do you offer samples or test areas?', a:'No, unfortunately not. But you can buy a starter kit and make samples at a low cost.' },
    { q:'Are your solutions UV-resistant?', a:'Yes.' },
    { q:'Can Contec Coating be used outdoors?', a:'Yes, but you may only use sealer solution 1 outdoors, as it is diffusion-open.' },
    { q:'Can we get special colors?', a:'Yes, with the COLOR series you can create your own completely unique color.' },
    { q:'Which surfaces can be treated?', a:'All solid substrates.' },
    { q:'Which solutions are suitable for wet rooms?', a:'Yes, simply finish with the wet room solution, WP BASE x2 and PU TOP x2. Afterwards maintenance with CC CARE is recommended.' },
    { q:'When can the bathroom be used?', a:'You can shower after a minimum of 24 hours, and you must follow the laws and regulations for putting the bathroom into use according to the requirements of the wet room silicone.' },
    { q:'Which systems are the most maintenance-free?', a:'Sealer solution 2 or 3, because they are finished with CC Sealer PU TOP.' },
    { q:'Can you get a terrazzo look?', a:'Yes, with Contec Coating FLAKES you can create a terrazzo look.' },
    { q:'Can the product be used in a basement?', a:'Yes, if there is moisture in the basement or rising damp from the ground, the sealer solution must be diffusion-open and therefore only UNIVERSAL SEALER is used as the final sealer.' },
    { q:'Can it be laid on wear layer concrete?', a:'Yes, it can. It is recommended to lightly sand the surface before starting.' },
    { q:'What is the difference between microcement and concrete look?', a:'Concrete look describes the appearance. Microcement is the product that can be used to create this expression.' },
    { q:'What is the difference between microcement and New Yorker floor?', a:'New Yorker floor describes a style with a raw concrete expression. Microcement is the product that can be used to create this expression.' },
    { q:'What is the difference between microcement and epoxy?', a:'Microcement is a cement-based, mineral surface with a natural concrete look. Epoxy is a synthetic plastic product that typically has a more artificial look.' },
    { q:'What is the difference between microcement and polyurethane?', a:'Microcement is a cement-based product that provides a raw concrete look, while polyurethane is a plastic/rubber-based product.' },
    { q:'Which is most climate-friendly: microcement, polyurethane or epoxy?', a:'Microcement is the most climate-friendly choice. It is a natural product based on cement, quartz sand and natural minerals. Both polyurethane and epoxy are synthetic plastic products (polymers) made from oil, which results in a significantly higher energy consumption and CO2 footprint during production.' },
    { q:'Is there a difference in the working climate when working with microcement, polyurethane or epoxy?', a:'Yes. Microcement is typically the gentlest choice during application, as it is primarily cement-based. Epoxy and polyurethane involve greater chemical risks and require more extensive protective equipment, ventilation and safety handling.' },
    { q:'Is microcement environmentally friendly?', a:'Microcement is not environmentally neutral, but it can be an environmentally friendly choice for renovation, primarily because it saves resources and waste. The material itself has a CO₂ footprint in cement production, but the overall environmental impact is often limited when considering its application. Contec Coating\'s microcement is applied in very thin layers, which results in a significantly lower CO₂ footprint compared to alternative products.' },
    { q:'How durable is microcement?', a:'Microcement is a strong surface that can be used in homes, commercial spaces and high-traffic areas.' },
    { q:'Where is the microcement produced?', a:'Contec Coating\'s microcement is developed and produced in Denmark as a distinct product series, based on more than 30 years of professional experience with high-strength concrete technology.' },
    { q:'Does all microcement consist of the same materials?', a:'No, microcement does not always consist of the same materials. It varies from manufacturer to manufacturer. Our microcement PURE is based on high-strength concrete and therefore typically has twice the abrasion and compressive strength of traditional microcement.' },
    { q:'Is there a difference in application method depending on the product supplier?', a:'Yes, there can be a big difference. Many types of microcement must be applied with a trowel and in some cases require reinforcement mesh. Contec Coating\'s microcement PURE can be applied in thin layers with a paint roller, which makes the process significantly simpler.' },
    { q:'Is there a difference in price depending on the product supplier?', a:'Yes, there can be a big difference in price. It depends on layer thickness, consumption, number of products and how simple the process is. Contec Coating\'s microcement is applied in thin layers and can therefore be a very cost-effective solution.' },
    { q:'Is there a difference in strength between different types of microcement?', a:'Yes, there can be very large differences in abrasion and compressive strength. Our microcement PURE is based on high-strength concrete and therefore typically has twice the abrasion and compressive strength of traditional microcement.' },
    { q:'What is microcement?', a:'Microcement is a thin cement-based surface treatment that can be used to create a raw concrete look.' },
    { q:'What is microcement used for?', a:'Microcement is a thin cement-based surface treatment typically used on floors, walls, bathrooms, countertops, furniture and other surfaces where a concrete look is desired.' },
    { q:'What is concrete look?', a:'Concrete look is a style that imitates the expression of raw concrete. It can be achieved with different materials, such as microcement, epoxy, polyurethane, filler or paint.' },
    { q:'What is a New Yorker floor?', a:'A New Yorker floor is a floor with a raw and industrial concrete look, inspired by the floors of old factory buildings.' },
    { q:'Which materials are used for a New Yorker floor?', a:'A New Yorker floor can be made with several materials, such as polished concrete, microcement, epoxy or polyurethane.' },
    { q:'Do New Yorker floors only come in grey?', a:'No, New Yorker floors are often associated with grey concrete look, but they can be made in any color from our color catalog.' },
    { q:'Can you make a New Yorker floor yourself?', a:'Yes, you can make a New Yorker-inspired floor yourself with microcement. You can carry out your own project here and get guidance for your project in start project.' },
    { q:'What is the difference between microcement and real concrete?', a:'Concrete is normally cast in thick layers. Microcement is a thin cement-based coating that provides a concrete look without having to cast a new concrete floor.' },
    { q:'What is the difference between microcement and effect paint?', a:'Microcement is a cement-based coating that cures into a strong surface. Effect paint is paint that only imitates the concrete look visually, but without the same robustness.', c:'generalFaq' },
    { q:'What is the difference between microcement, concrete look and New Yorker floor?', a:'Many confuse the terms. Concrete look and New Yorker floor are expressions and styles, while microcement is a material.', c:'generalFaq' },
    { q:'Is microcement a material or just an appearance?', a:'Microcement is a material. It is a thin cement-based coating that can be used to create a concrete look.', c:'generalFaq' },
    { q:'Does microcement have to contain cement?', a:'Yes, genuine microcement must be cement-based. If the product is primarily based on epoxy, polyurethane, acrylic or other plastic-based binders, it is not a microcement product, but typically a plastic product.', c:'generalFaq' },
    { q:'What is high-strength microcement?', a:'High-strength microcement is a stronger type of microcement, where the surface is based on high-strength concrete technology rather than traditional microcement. It gives the surface a significantly higher abrasion and compressive strength.', c:'generalFaq' },
    { q:'Why can Contec Coating\'s microcement be applied with a paint roller?', a:'Contec Coatings PURE is developed with very small particle sizes and a unique flowability, so it can be applied in ultra-thin layers with a paint roller. This makes the process simpler than traditional microcement, which often needs to be troweled on.', c:'generalFaq' },
    { q:'What does coating mean?', a:'Coating is a surface treatment where a thin decorative or protective layer is applied to a material to improve its appearance, properties and lifespan.', c:'generalFaq' },
    { q:'Is microcement the same as concrete?', a:'No. Although microcement is the closest you can get to real concrete in appearance, it is not the same. Concrete is a constructive and load-bearing material with larger aggregates, while microcement is a decorative surface product where the aggregates are crushed down to ultrafine particles.', c:'generalFaq' },
    { q:'Are microcement and microbeton the same?', a:'Yes. In everyday speech, both terms are used for the same type of product, as they both consist of much finer particles than traditional concrete.', c:'generalFaq' },
    { q:'Why is it called microcement?', a:'The name is actually somewhat misleading, as the cement particles are the same as in ordinary concrete. The difference is that the other aggregates are crushed down to ultrafine particles. Therefore, microbeton is perhaps a more accurate name, although both terms are used in everyday speech.', c:'generalFaq' },
    { q:'What is a mineral surface?', a:'A mineral surface is a surface where the visible layer mainly consists of inorganic materials such as cement, lime, sand and stone. The opposite is a plastic or organic based surface, where the binders primarily consist of synthetic materials.', c:'generalFaq' },
    { q:'What is a microcement floor?', a:'A microcement floor is a floor with a thin cement-based coating that provides a strong surface and a raw concrete look.', c:'gulv' },
    { q:'Can microcement be used on floors?', a:'Yes, microcement is suitable in both private homes and for commercial floors, provided there is a robust and stable substrate.', c:'gulv' },
    { q:'What is the difference between a microcement floor and an epoxy floor?', a:'Microcement is cement-based and provides a natural concrete look. Epoxy is plastic-based and provides a more artificial appearance.', c:'gulv' },
    { q:'What is the difference between a microcement floor and a polyurethane floor?', a:'Microcement is cement-based and provides a natural concrete look. Polyurethane is plastic-based and provides a more artificial appearance.', c:'gulv' },
    { q:'What is the difference between a microcement floor and a New Yorker floor?', a:'New Yorker floor describes a raw concrete look. Microcement is a material that can be used to create that expression.', c:'gulv' },
    { q:'Can you create a concrete look floor with microcement?', a:'Yes, microcement is well suited for creating a concrete look on floors.', c:'gulv' },
